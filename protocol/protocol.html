<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHAMP Protocol – Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --red: #d33131;
      --blue: #1975d2;
      --break: #00A550;
      --neutral-1: #f5f5f5;
      --neutral-2: #9e9e9e;
      --neutral-3: #616161;
      --border: #c9c9c9;
      --text: #1f1f1f;
    }

    html,
    body {
      margin: 0;
      min-width: 20rem;
      min-height: 20rem;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: var(--neutral-1);
    }

    html {
      font-size: clamp(0.875em, 1.5vw, 1em);
    }

    body {
      padding: 0.5rem;
    }

    .app {
      height: calc(100vh - 1rem);
      min-height: 19rem;
      border: 0.0625rem solid var(--border);
      background: #fff;
      border-radius: 0.5rem;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 0.5rem;
      padding: 0.5rem;
      overflow: hidden;
    }

    .top-bar {
      display: grid;
      grid-template-columns: minmax(7.5rem, 1fr) auto auto auto;
      gap: 0.5rem;
      align-items: center;
    }

    .field,
    .select,
    .action {
      min-height: 2.25rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0 0.6rem;
    }

    .action {
      font-weight: 600;
      cursor: pointer;
    }

    /* Mirror the pencil glyph for the blue side's header action button */
    .side.blue .side-head .action {
      display: inline-block;
      transform: scaleX(-1);
      line-height: 1;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      min-height: 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr minmax(8.125rem, 11.25rem) 1fr;
      gap: 0.5rem;
      min-height: 0;
    }

    /* Shared base for wrestler panels (board) and button columns */
    .side, .button-side {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      display: grid;
      gap: 0.45rem;
      min-height: 0;
    }

    /* Board panels have an extra row for injury display */
    .side        { grid-template-rows: auto auto auto 1fr; }
    .button-side { grid-template-rows: auto 1fr; }

    /* Tinted background for colour-coded columns */
    .side.red, .button-side.red   { background: color-mix(in srgb, var(--red)  8%, white); }
    .side.blue, .button-side.blue { background: color-mix(in srgb, var(--blue) 8%, white); }

    .side-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }

    .score {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      font-weight: 700;
      text-align: center;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0.2rem 0;
    }

    .injury-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .mini-time {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0.35rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .button-side.red  { --side-color: var(--red); }
    .button-side.blue { --side-color: var(--blue); }

    .button-side .mini-time.running {
      background: #fff9c4;
      border-color: #f9a825;
      color: #000;
      font-weight: 700;
    }

    .event-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem;
      align-content: start;
    }

    .event-btn {
      border: 0.0625rem solid transparent;
      border-radius: 0.375rem;
      min-height: 3rem;
      font-weight: 700;
      cursor: default;
      color: #fff;
    }

    .red .event-btn {
      background: var(--red);
      border-color: var(--red);
    }

    .blue .event-btn {
      background: var(--blue);
      border-color: var(--blue);
    }

    .event-btn:disabled {
      opacity: 0.5;
      background: var(--neutral-2) !important;
      border-color: var(--neutral-2) !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .bout-time:disabled {
      opacity: 0.5;
      background: var(--neutral-1) !important;
      border-color: var(--neutral-2) !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .bout-time.running {
      background: #fff9c4;
      border-color: #f9a825;
      color: #000;
      font-weight: 700;
    }

    .bout-time.break-mode {
      background: var(--break);
      border-color: var(--break);
      color: #fff;
    }

    .bout-time.break-mode .time-label,
    .bout-time.break-mode .time-note {
      color: #fff;
    }

    .center {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 0.5rem;
      align-content: start;
    }

    .mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.35rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      padding: 0.25rem 0.35rem;
    }

    .mode-chip {
      border-radius: 999rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0.16rem 0.45rem;
      border: 0.0625rem solid var(--neutral-3);
      color: var(--neutral-3);
      background: #fff;
    }

    .mode-chip.active {
      background: var(--neutral-3);
      color: #fff;
    }

    .mode-hint {
      color: var(--neutral-3);
      font-weight: 600;
    }

    .time-label {
      text-align: center;
      color: var(--neutral-3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bout-time {
      border: 0.125rem solid var(--neutral-3);
      border-radius: 0.625rem;
      background: #fff;
      padding: 0.6rem 0.3rem;
      cursor: pointer;
      text-align: center;
    }

    .time {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      line-height: 1;
      display: inline-block;
      /* reserve space for visual superscript added via ::after */
    }

    /* Visual-only superscript for the 100ms digit. Uses a data attribute so
       the textual content (used by tests/assistive tech) remains M:SS. */
    .time::after {
      content: attr(data-fraction);
      font-size: 0.45em;
      vertical-align: super;
      margin-left: 0.08em;
      line-height: 1;
      color: inherit;
      display: inline-block;
    }

    .time-note {
      margin-top: 0.2rem;
      color: var(--neutral-3);
    }

    .timeline-wrapper {
      position: relative;
    }

    .timeline {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.4rem;
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      align-items: flex-start;
    }

    .entry {
      min-width: 3.125rem;
      display: grid;
      gap: 0.15rem;
      justify-items: center;
    }

    .entry-box {
      width: 3.125rem;
      height: 2.5rem;
      border-radius: 0.25rem;
      border: 0.125rem solid;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
    }

    .entry-box.caution {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }

    .entry-box.caution.blue {
      border-color: var(--blue);
    }

    .entry-box.caution.red {
      border-color: var(--red);
    }

    .caution-row {
      width: 100%;
      display: grid;
      place-items: center;
      font-weight: 700;
      line-height: 1;
      color: #fff;
    }

    .caution-row.blue {
      background: var(--blue);
    }

    .caution-row.red {
      background: var(--red);
    }

    .caution-row.neutral {
      background: var(--neutral-1);
      color: var(--neutral-3);
    }

    .entry-box.period-end {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0;
      overflow: hidden;
      background: var(--neutral-1);
      border-color: var(--neutral-3);
    }

    .entry-box.red {
      background: var(--red);
      border-color: var(--red);
    }

    .entry-box.blue {
      background: var(--blue);
      border-color: var(--blue);
    }

    .entry-box.next {
      background: var(--neutral-1);
      border-color: var(--neutral-3);
      border-style: dashed;
      color: var(--neutral-3);
    }

    .entry-box.cursor {
      border-color: var(--neutral-3);
      box-shadow: 0 0 0 0.125rem #fff, 0 0 0 0.25rem var(--neutral-3);
    }

    .entry-box.cursor.swap-mode {
      box-shadow: 0 0 0 0.125rem #fff, 0 0 0 0.25rem var(--text), 0 0 0 0.375rem #fff, 0 0 0 0.5rem var(--text);
    }

    .entry.swap-origin > .entry-box {
      border-style: dashed;
      opacity: 0.7;
    }

    .entry-time {
      font-size: 0.5rem;
      color: var(--neutral-3);
      font-variant-numeric: tabular-nums;
    }

    .timeline.correction-mode {
      border-color: var(--neutral-3);
      border-width: 0.125rem;
      background: color-mix(in srgb, var(--neutral-2) 10%, white);
    }

    .entry.pending-deleted {
      opacity: 0.2;
    }

    .entry-box.pending-inserted {
      border-style: dotted;
      border-color: var(--neutral-1) !important;
    }

    .entry-time.time-modified {
      border: 0.0625rem dashed var(--neutral-3);
      border-radius: 0.125rem;
      padding: 0 0.125rem;
    }

    .entry-box.correction {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }

    .entry-box.correction.red { border-color: var(--red); }
    .entry-box.correction.blue { border-color: var(--blue); }
    .entry-box.correction.next { border-color: var(--neutral-3); }

    .caution-row.old {
      background: var(--neutral-1);
      color: var(--neutral-3);
      text-decoration: line-through;
    }

    .correction-bar {
      display: none;
      position: absolute;
      right: 0.25rem;
      bottom: -0.5rem;
      gap: 0.25rem;
      align-items: center;
      z-index: 2;
    }

    .timeline.correction-mode ~ .correction-bar {
      display: flex;
    }

    .correction-action {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      color: var(--neutral-3);
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
    }

    .correction-action.primary {
      background: var(--neutral-3);
      border-color: var(--neutral-3);
      color: #fff;
    }

    /* ── Context menu ─────────────────────────────────────────────────────── */
    #context-menu {
      position: fixed;
      z-index: 1000;
      background: #fff;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      box-shadow: 0 0.25rem 0.75rem rgba(0,0,0,0.18);
      display: none;
      flex-direction: column;
      overflow: hidden;
      min-width: 9rem;
    }

    #context-menu.open {
      display: flex;
    }

    .context-menu-item {
      border: none;
      background: transparent;
      text-align: left;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.875rem;
      color: var(--text);
      font-family: inherit;
    }

    .context-menu-item:hover:not([data-noop]) {
      background: var(--neutral-1);
    }

    .context-menu-item[data-noop] {
      color: var(--neutral-2);
      cursor: default;
    }

    #completion-form {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      padding: 0.4rem;
      display: grid;
      gap: 0.3rem;
      transition: background 0.2s, border-color 0.2s;
    }

    #completion-form.winner-red {
      background: color-mix(in srgb, var(--red) 12%, white);
      border-color: var(--red);
    }

    #completion-form.winner-blue {
      background: color-mix(in srgb, var(--blue) 12%, white);
      border-color: var(--blue);
    }

    #completion-form select {
      min-height: 2rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      padding: 0 0.4rem;
      background: #fff;
      width: 100%;
    }

    .compl-points-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem;
    }

    .compl-points {
      border: 0.0625rem solid;
      border-radius: 0.375rem;
      min-height: 2rem;
      text-align: center;
      font-weight: 600;
      padding: 0 0.3rem;
      width: 100%;
      background: #fff; /* shared between both colour variants and disabled state */
    }

    .compl-points.red  { border-color: var(--red);  color: var(--red);  }
    .compl-points.blue { border-color: var(--blue); color: var(--blue); }

    .compl-points:disabled {
      border-color: var(--border);
      color: var(--neutral-3);
      background: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Time modification modal                                              */
    /* ------------------------------------------------------------------ */
    #time-mod-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #time-mod-popup {
      background: #fff;
      border: 0.125rem solid var(--neutral-3);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      min-width: 14rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: 0 0.25rem 1.5rem rgba(0, 0, 0, 0.25);
    }

    #time-mod-title {
      font-weight: 700;
      font-size: 1.05em;
    }

    #time-mod-hint {
      font-size: 0.82em;
      color: var(--neutral-3);
    }

    #time-mod-input {
      font-size: 1.75em;
      text-align: center;
      font-variant-numeric: tabular-nums;
      border: 0.125rem solid var(--border);
      border-radius: 0.375rem;
      padding: 0.2rem 0.5rem;
      width: 100%;
    }

    #time-mod-input:focus {
      outline: none;
      border-color: var(--neutral-3);
    }

    #time-mod-input.invalid {
      border-color: var(--red);
    }

    #time-mod-error {
      color: var(--red);
      font-size: 0.8em;
    }

    #time-mod-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 0.25rem;
    }

    #time-mod-cancel {
      padding: 0.375rem 0.75rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      cursor: pointer;
      font-size: 0.9em;
    }

    #time-mod-confirm {
      padding: 0.375rem 0.875rem;
      border: 0.0625rem solid var(--neutral-3);
      border-radius: 0.375rem;
      background: var(--neutral-3);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9em;
    }

  </style>
</head>
<body>
  <main id="app" class="app" aria-label="CHAMP Protocol Prototype">
    <section id="top-bar" class="top-bar" aria-label="Scoresheet Header">
      <input id="bout-info" class="field" type="text" value="Wettkampf: Landesmeisterschaft; U17 74kg" aria-label="Bout Info" />
      <select id="style-select" class="select" aria-label="Style">
        <option selected>Freestyle</option>
        <option>Greco-Roman</option>
      </select>
      <select id="ruleset-select" class="select" aria-label="Ruleset">
        <option selected>Default Ruleset</option>
      </select>
    </section>

    <section id="board" class="board" aria-label="Bout Area">
      <article id="side-red" class="side red" aria-label="Wrestler Red">
        <header id="info-red" class="side-head"><button class="action" type="button" aria-label="Bearbeiten">✎</button><span>Rot</span></header>
        <div id="score-red" class="score" aria-label="Score Red">0</div>
      </article>

      <article id="side-blue" class="side blue" aria-label="Wrestler Blue">
        <header id="info-blue" class="side-head"><span>Blau</span><button class="action" type="button" aria-label="Bearbeiten">✎</button></header>
        <div id="score-blue" class="score" aria-label="Score Blue">0</div>
      </article>
    </section>

    <div id="timeline-wrapper" class="timeline-wrapper">
      <section id="timeline" class="timeline" aria-label="Timeline">
        <!-- Events will be added dynamically -->
      </section>
      <div id="correction-bar" class="correction-bar" aria-label="Correction Actions">
        <button id="corr-confirm" class="correction-action primary" type="button">[Enter] Übernehmen</button>
        <button id="corr-cancel" class="correction-action" type="button">[Esc] Verwerfen</button>
      </div>
    </div>

    <section id="buttons" class="buttons" aria-label="Bout Buttons">
      <article id="buttons-red" class="button-side red" aria-label="Red Button Column">
        <div class="injury-grid" aria-label="Red Injury Times">
          <button id="injury-time-red" class="mini-time" type="button">TIR 0:00</button>
          <button id="blood-time-red" class="mini-time" type="button">TBR 0:00</button>
        </div>
        <div id="event-buttons-red" class="event-grid" aria-label="Red Event Buttons">
          <button class="event-btn" type="button">[1R]</button>
          <button class="event-btn" type="button">[4R]</button>
          <button class="event-btn" type="button">[5R]</button>
          <button class="event-btn" type="button">[2R]</button>
          <button class="event-btn" type="button">[PR]</button>
          <button class="event-btn" type="button">[0R1B]</button>
          <button class="event-btn" type="button">[0R2B]</button>
        </div>
      </article>

      <article id="center" class="center" aria-label="Timing">
        <button class="bout-time" type="button" id="bout-time-button" aria-label="Bout Time Toggle">
          <div class="time-label">Kampfzeit</div>
          <div id="bout-time-display" class="time" data-fraction="0" aria-live="polite">3:00</div>
          <div class="time-note">[Leertaste]</div>
        </button>
        <div id="completion-form" aria-label="Completion Form">
          <select id="compl-winner" aria-label="Winner" disabled>
            <option value="-">-</option>
            <option value="red">Rot</option>
            <option value="blue">Blau</option>
          </select>
          <select id="compl-victory-type" aria-label="Victory Type" disabled>
          </select>
          <div class="compl-points-row">
            <input id="compl-points-red" class="compl-points red" type="number" min="0" value="0" aria-label="Red Points" disabled />
            <input id="compl-points-blue" class="compl-points blue" type="number" min="0" value="0" aria-label="Blue Points" disabled />
          </div>
        </div>
        <button id="release-complete-button" class="action" type="button" aria-label="Release">Freigeben [F4]</button>
        <button id="export-button" class="action" type="button" style="display:none" aria-label="Export">Exportieren [F8]</button>
      </article>

      <article id="buttons-blue" class="button-side blue" aria-label="Blue Button Column">
        <div class="injury-grid" aria-label="Blue Injury Times">
          <button id="blood-time-blue" class="mini-time" type="button">TBB 0:00</button>
          <button id="injury-time-blue" class="mini-time" type="button">TIB 0:00</button>
        </div>
        <div id="event-buttons-blue" class="event-grid" aria-label="Blue Event Buttons">
            <button class="event-btn" type="button">[5B]</button>
            <button class="event-btn" type="button">[4B]</button>
            <button class="event-btn" type="button">[1B]</button>
            <button class="event-btn" type="button">[0B1R]</button>
            <button class="event-btn" type="button">[PB]</button>
            <button class="event-btn" type="button">[2B]</button>
            <button class="event-btn" type="button">[0B2R]</button>
        </div>
      </article>
    </section>
  </main>

  <!-- Context menu for timeline entries (right-click / long-press) -->
  <div id="context-menu" role="menu" aria-label="Ereignis-Optionen">
    <button id="ctx-delete" class="context-menu-item" type="button" role="menuitem">🗑️ [Entf] Ereignis löschen</button>
    <button id="ctx-insert" class="context-menu-item" type="button" role="menuitem">➕ [##] Ereignis einfügen</button>
    <button id="ctx-swap"   class="context-menu-item" type="button" role="menuitem">🔄 [#][←|→] Ereignisse tauschen</button>
    <button id="ctx-time"   class="context-menu-item" type="button" role="menuitem">⏱️ [T] Zeit ändern</button>
    <button id="ctx-insert-cancel" class="context-menu-item" type="button" role="menuitem" hidden>[Esc] Abbrechen</button>
  </div>

  <!-- Time modification modal (bout time and injury/blood timers) -->
  <div id="time-mod-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="time-mod-title">
    <div id="time-mod-popup">
      <div id="time-mod-title">Kampfzeit ändern [TT]</div>
      <div id="time-mod-hint">Verbleibende Zeit eingeben (M:SS)</div>
      <input id="time-mod-input" type="text" pattern="\d+:[0-5]\d" placeholder="M:SS" maxlength="5" autocomplete="off" />
      <div id="time-mod-error" style="display:none;">Ungültiges Format. Bitte M:SS eingeben.</div>
      <div id="time-mod-actions">
        <button id="time-mod-cancel" type="button">Abbrechen [Esc]</button>
        <button id="time-mod-confirm" type="button">OK [Enter]</button>
      </div>
    </div>
  </div>

  <div style="position: fixed; top: 0; left: 0; opacity: 0; width: 0.625rem; height: 0.625rem;">
    <button id="start" type="button">Start</button>
    <button id="stop" type="button">Stop</button>
  </div>

  <!-- Embedded default ruleset: protocol/rulesets/ruleset-default.json -->
  <script id="default-ruleset" type="application/json">
  {
    "metadata": {
      "name": "de-mannschaftskampf-2025",
      "description": "Deutsches Regelwerk für Mannschaftskämpfe",
      "languages": ["de"],
      "author": "Deutscher Ringer-Bund"
    },
    "periodTimesInSeconds": [180, 180],
    "periodTimeCountingDirection": "Down",
    "periodBreakTimeInSeconds": 30,
    "injuryTimeWithoutBloodInSeconds": 120,
    "injuryTimeWithBloodInSeconds": 240,
    "injuryTimeCountingDirection": "Up",
    "freestyle": {
      "activityTimeInSeconds": 30,
      "activityTimeCountingDirection": "Down",
      "activityTimeCondition": {
        "passivityCount": { "gt": 1 }
      }
    },
    "victoryTypes": [
      { "type": "SS", "description": "Schultersieg", "classificationPoints": { "winner": 4, "loser": 0 } },
      {
        "type": "TÜ",
        "description": "Technische Überlegenheit",
        "classificationPoints": { "winner": 4, "loser": 0 },
        "condition": { "scoreDifference": { "gte": 15 } }
      },
      {
        "type": "PS",
        "description": "Punktsieg",
        "classificationPoints": {
          "winner": [
            [3, { "when": { "scoreDifference": { "gte": 8, "lte": 14 } } }],
            [2, { "when": { "scoreDifference": { "gte": 3, "lte": 7 } } }],
            [1, { "when": { "scoreDifference": { "gte": 1, "lte": 2 } } }],
            [1, { "when": { "award5Difference": { "gt": 0 } } }],
            [1, { "when": { "award4Difference": { "gt": 0 } } }],
            [1, { "when": { "award2Difference": { "gt": 0 } } }],
            [1, { "when": { "lastAward": { "eq": 1 } } }]
          ],
          "loser": 0
        }
      },
      { "type": "AS", "description": "Aufgabesieg", "classificationPoints": { "winner": 4, "loser": 0 } },
      { "type": "DV", "description": "Disqualifikation durch 3 Verwarnungen", "classificationPoints": { "winner": 4, "loser": 0 }, "condition": { "cautionCount": { "gte": 3 } } },
      { "type": "DQ", "description": "Disqualifikation durch unfaires Verhalten", "classificationPoints": { "winner": 4, "loser": 0 } },
      { "type": "DSQ2", "description": "Beide Ringer disqualifiziert wegen unfairem Verhalten", "classificationPoints": { "winner": 0, "loser": 0 } },
      { "type": "KL", "description": "Kampfloser Sieg", "classificationPoints": { "winner": 4, "loser": 0 } },
      { "type": "ÜG", "description": "Übergewicht", "classificationPoints": { "winner": 4, "loser": 0 } }
    ]
  }
  </script>

  <script>
    // ===================================================================
    // APP STATE
    // ===================================================================
    const appState = {
      mode: 'New', // 'New' | 'Recording' | 'Completing' | 'Completed' | 'Re-released'
      timerRunning: false,
      timerIntervalId: null,
      boutTime100ms: 0, // in 100ms units
      periodTime100ms: 1800, // 3 minutes = 180 seconds = 1800 * 100ms units
      sequenceCounter: 0,
      events: [],
      createdAt: null,
      completed: false,
      completedAt: null,
      winner: null,
      victoryType: null,
      victoryDescription: null,
      classificationPoints: null,
      keyBuffer: [],
      currentPeriodIndex: 0,
      breakTimerRunning: false,
      breakTime100ms: 0,
      injuryTimers: {
        IR: { running: false, time100ms: 0, intervalId: null },
        IB: { running: false, time100ms: 0, intervalId: null },
        BR: { running: false, time100ms: 0, intervalId: null },
        BB: { running: false, time100ms: 0, intervalId: null }
      },
      activityTimers: {
        AR: { active: false, time100ms: 0, seq: null }, // activity time for red
        AB: { active: false, time100ms: 0, seq: null }  // activity time for blue
      },
      timeModTarget: null,  // null = bout time, 'IR'/'IB'/'BR'/'BB' = injury timer, 'correctionBoutTime' = correction mode
      timeModCorrectionEvent: null, // event being time-modified in correction mode
      inCorrectionMode: false,
      inInsertMode: false,  // sub-mode of correction: ## pressed, waiting for event type
      inSwapMode: false,    // sub-mode of correction: # pressed, selecting swap partner
      swapOriginIndex: null, // cursorIndex when swap mode was entered (fixed origin)
      cursorIndex: null,    // null = at next-event; integer = index in cursorsable bout events
      correctionBuffer: []  // pending {refSeq, newEventType} or {refSeq, deleted:true} or {insertBefore, boutTime100ms, insertedEventType} or {swapped:true, refSeq1, refSeq2} or {timeModified:true, refSeq, oldBoutTime100ms, newBoutTime100ms, eventType, insertBefore}
    };

    // ===================================================================
    // TIMER LOGIC
    // ===================================================================
    const boutTimeDisplay = document.getElementById("bout-time-display");
    const startButton = document.getElementById("start");
    const stopButton = document.getElementById("stop");
    const boutTimeButton = document.getElementById("bout-time-button");

    // Test-only functions that bypass mode checks
    function testStartTimer() {
      if (appState.timerIntervalId !== null) return;
      appState.timerRunning = true;
      appState.timerIntervalId = setInterval(tick, 100);
    }

    function testStopTimer() {
      if (appState.timerIntervalId === null) return;
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.timerRunning = false;
    }

    function formatTime100ms(time100ms) {
      const totalSeconds = Math.floor(time100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const fraction = Math.floor((time100ms % 10));
      return `${minutes}:${seconds.toString().padStart(2, "0")}.${fraction}`;
    }

    function updateBoutTimeDisplay() {
      // Display minutes:seconds as the textual content (keeps compatibility
      // with existing tests and assistive technologies) and expose the
      // 100ms digit through a data attribute that is rendered visually
      // as a superscript via CSS ::after.
      const totalSeconds = Math.floor(appState.periodTime100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      boutTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
      const fraction = Math.floor(appState.periodTime100ms % 10);
      boutTimeDisplay.dataset.fraction = String(fraction);
    }

    function tick() {
      if (!appState.timerRunning) return;
      
      appState.boutTime100ms++;
      appState.periodTime100ms--;
      
      updateBoutTimeDisplay();

      // Tick active activity timers (they run in sync with the bout timer)
      let anyTimerExpired = false;
      ['AR', 'AB'].forEach(key => {
        const at = appState.activityTimers[key];
        if (!at.active) return;
        at.time100ms--;
        if (at.time100ms <= 0) {
          at.active = false;
          at.time100ms = 0;
          at.seq = null;
          anyTimerExpired = true;
        } else {
          updateActivityTimerDisplay(key);
        }
      });
      
      if (appState.periodTime100ms <= 0) {
        // Period over: delete any remaining activity timers before recording PeriodEnd
        ['AR', 'AB'].forEach(key => {
          const at = appState.activityTimers[key];
          if (at.active) {
            at.active = false;
            at.time100ms = 0;
            at.seq = null;
            anyTimerExpired = true;
          }
        });
        stopTimer();
        if (appState.mode === 'Recording') {
          recordEvent({ eventType: 'PeriodEnd', boutTime100ms: appState.boutTime100ms });
          // recordEvent() calls updateTimeline(), which re-renders expired timers
          const ruleset = loadEmbeddedRuleset();
          const nextPeriodIndex = appState.currentPeriodIndex + 1;
          if (ruleset && nextPeriodIndex < ruleset.periodTimesInSeconds.length) {
            appState.currentPeriodIndex = nextPeriodIndex;
            startPeriodBreak(ruleset.periodBreakTimeInSeconds);
          } else {
            boutTimeButton.disabled = true;
          }
        }
      } else if (anyTimerExpired) {
        // Re-render timeline to switch from two-row to single-row format
        updateTimeline();
      }
    }

    function updateBreakTimeDisplay() {
      const totalSeconds = Math.floor(appState.breakTime100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      boutTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
      boutTimeDisplay.dataset.fraction = String(Math.floor(appState.breakTime100ms % 10));
    }

    function startPeriodBreak(breakSeconds) {
      appState.breakTime100ms = breakSeconds * 10;
      appState.breakTimerRunning = true;
      boutTimeButton.classList.add('break-mode');
      boutTimeButton.querySelector('.time-label').textContent = 'Kampfpause';
      boutTimeButton.querySelector('.time-note').textContent = '[Leertaste] → Abbruch';
      updateBreakTimeDisplay();
      appState.timerIntervalId = setInterval(tickBreak, 100);
    }

    function tickBreak() {
      appState.breakTime100ms--;
      updateBreakTimeDisplay();
      if (appState.breakTime100ms <= 0) {
        endPeriodBreak();
      }
    }

    function endPeriodBreak() {
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.breakTimerRunning = false;
      const ruleset = loadEmbeddedRuleset();
      const nextPeriodTime = ruleset.periodTimesInSeconds[appState.currentPeriodIndex] ?? 180;
      appState.periodTime100ms = nextPeriodTime * 10;
      boutTimeButton.classList.remove('break-mode');
      boutTimeButton.querySelector('.time-label').textContent = 'Kampfzeit';
      boutTimeButton.querySelector('.time-note').textContent = '[Leertaste]';
      updateBoutTimeDisplay();
    }

    // ===================================================================
    // INJURY TIMER LOGIC
    // ===================================================================
    const INJURY_TIMER_LABELS = { IR: 'TIR', IB: 'TIB', BR: 'TBR', BB: 'TBB' };
    const INJURY_TIMER_IDS    = { IR: 'injury-time-red', IB: 'injury-time-blue', BR: 'blood-time-red', BB: 'blood-time-blue' };

    function getInjuryTimerMax(timerKey) {
      const ruleset = loadEmbeddedRuleset();
      if (!ruleset) return 1200; // 120s fallback
      if (timerKey === 'IR' || timerKey === 'IB') {
        return (ruleset.injuryTimeWithoutBloodInSeconds ?? 120) * 10;
      }
      return (ruleset.injuryTimeWithBloodInSeconds ?? 240) * 10;
    }

    function formatInjuryTime(time100ms) {
      const totalSeconds = Math.floor(time100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateInjuryTimerDisplay(timerKey) {
      const el = document.getElementById(INJURY_TIMER_IDS[timerKey]);
      if (!el) return;
      const it = appState.injuryTimers[timerKey];
      const ruleset = loadEmbeddedRuleset();
      const direction = ruleset?.injuryTimeCountingDirection ?? 'Up';
      let displayTime;
      if (direction === 'Down') {
        displayTime = getInjuryTimerMax(timerKey) - it.time100ms;
      } else {
        displayTime = it.time100ms;
      }
      el.textContent = `${INJURY_TIMER_LABELS[timerKey]} ${formatInjuryTime(displayTime)}`;
      el.classList.toggle('running', it.running);
    }

    function tickInjuryTimer(timerKey) {
      const it = appState.injuryTimers[timerKey];
      if (!it.running) return;
      it.time100ms++;
      updateInjuryTimerDisplay(timerKey);
      if (it.time100ms >= getInjuryTimerMax(timerKey)) {
        stopInjuryTimer(timerKey);
      }
    }

    function startInjuryTimer(timerKey) {
      if (appState.timerRunning) return;
      const it = appState.injuryTimers[timerKey];
      if (it.running) return;
      // Stop the other injury timer for the same wrestler (only one at a time per side)
      const sideTimers = (timerKey === 'IR' || timerKey === 'BR') ? ['IR', 'BR'] : ['IB', 'BB'];
      sideTimers.forEach(key => {
        if (key !== timerKey && appState.injuryTimers[key].running) {
          stopInjuryTimer(key);
        }
      });
      it.running = true;
      it.intervalId = setInterval(() => tickInjuryTimer(timerKey), 100);
      if (appState.mode === 'Recording' || appState.mode === 'Completing') {
        recordEvent({ eventType: `T_${timerKey}_Started`, boutTime100ms: appState.boutTime100ms });
      }
      updateInjuryTimerDisplay(timerKey);
    }

    function stopInjuryTimer(timerKey) {
      const it = appState.injuryTimers[timerKey];
      if (!it.running) return;
      clearInterval(it.intervalId);
      it.intervalId = null;
      it.running = false;
      if (appState.mode === 'Recording' || appState.mode === 'Completing') {
        recordEvent({ eventType: `T_${timerKey}_Stopped`, boutTime100ms: appState.boutTime100ms });
      }
      updateInjuryTimerDisplay(timerKey);
    }

    function toggleInjuryTimer(timerKey) {
      if (appState.injuryTimers[timerKey].running) {
        stopInjuryTimer(timerKey);
      } else {
        startInjuryTimer(timerKey);
      }
    }

    // ===================================================================
    // ACTIVITY TIMER LOGIC
    // ===================================================================

    /**
     * Returns the activity-time configuration for the currently selected
     * wrestling style from the embedded ruleset, or null if none is defined.
     * Example: { activityTimeInSeconds: 30, activityTimeCountingDirection: "Down",
     *            activityTimeCondition: { passivityCount: { gt: 1 } } }
     */
    function getActivityTimeConfig() {
      const styleEl = document.getElementById('style-select');
      if (!styleEl) return null;
      const styleKey = styleEl.value.toLowerCase();
      const ruleset = loadEmbeddedRuleset();
      if (!ruleset) return null;
      return ruleset[styleKey] ?? null;
    }

    /**
     * Returns true when the next passivity award for `side` ('red'|'blue')
     * should be recorded as an activity-time event (AR/AB) rather than PR/PB.
     * Uses activityTimeCondition from the ruleset, evaluated with the passivity
     * count that would result after adding the new award.
     */
    function shouldUseActivityTime(side) {
      const conf = getActivityTimeConfig();
      if (!conf?.activityTimeCondition || !conf.activityTimeInSeconds) return false;
      const sideKey = side === 'red' ? 'R' : 'B';
      const events = getEffectiveBoutEvents();
      // Count existing passivity for this side: both PR/PB (normal) and AR/AB (activity time)
      const existingCount = events.filter(
        e => e.eventType === `P${sideKey}` || e.eventType === `A${sideKey}`
      ).length;
      // Evaluate condition including the new award being recorded
      return evaluateCondition(conf.activityTimeCondition, { passivityCount: existingCount + 1 });
    }

    /**
     * Start an activity timer for the given key ('AR'|'AB'), associating it
     * with the recorded event identified by `seq`.  If a timer for that side
     * is already running it is replaced.
     */
    function startActivityTimer(key, seq) {
      const conf = getActivityTimeConfig();
      if (!conf) return;
      const at = appState.activityTimers[key];
      // Replace any existing active timer for this side
      at.active = true;
      at.time100ms = (conf.activityTimeInSeconds ?? 30) * 10;
      at.seq = seq;
      // Re-render so the new two-row entry is visible immediately
      updateTimeline();
    }

    /**
     * Delete an active activity timer, updating both state and the live DOM
     * so the bottom row disappears without a full timeline re-render.
     * Pass `silent = true` when a full re-render will follow immediately.
     */
    function deleteActivityTimer(key, silent = false) {
      const at = appState.activityTimers[key];
      if (!at.active) return;
      const seq = at.seq;
      at.active = false;
      at.time100ms = 0;
      at.seq = null;
      if (!silent) updateTimeline();
    }

    /**
     * Returns the formatted display time string for the given activity timer key,
     * respecting the ruleset's activityTimeCountingDirection ('Down'/'Up').
     */
    function formatActivityTime(key) {
      const at = appState.activityTimers[key];
      const conf = getActivityTimeConfig();
      const direction = conf?.activityTimeCountingDirection ?? 'Down';
      const maxTime100ms = (conf?.activityTimeInSeconds ?? 30) * 10;
      const displayTime = direction === 'Down' ? at.time100ms : maxTime100ms - at.time100ms;
      return formatTime100ms(displayTime);
    }

    /**
     * Update only the activity-timer text node in the existing timeline DOM
     * (called on every 100 ms tick to avoid full re-renders).
     */
    function updateActivityTimerDisplay(key) {
      const at = appState.activityTimers[key];
      if (!at.active || at.seq === null) return;
      const entry = document.querySelector(`#timeline .entry[data-seq="${at.seq}"]`);
      if (!entry) return;
      const timerRow = entry.querySelector('.activity-timer-row');
      if (timerRow) timerRow.textContent = formatActivityTime(key);
    }

    function startTimer() {
      if (appState.mode !== 'Recording') return;
      if (appState.timerIntervalId !== null) return;
      if (Object.values(appState.injuryTimers).some(it => it.running)) return;
      
      appState.timerRunning = true;
      appState.timerIntervalId = setInterval(tick, 100); // 100ms intervals
      boutTimeButton.classList.add('running');
      recordEvent({ eventType: 'T_Started', boutTime100ms: appState.boutTime100ms });
    }

    function stopTimer() {
      if (appState.timerIntervalId === null) return;
      
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.timerRunning = false;
      boutTimeButton.classList.remove('running');
      recordEvent({ eventType: 'T_Stopped', boutTime100ms: appState.boutTime100ms });
    }

    function toggleTimer() {
      if (appState.mode !== 'Recording') return;
      
      if (appState.timerRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    }

    startButton.addEventListener("click", testStartTimer);
    stopButton.addEventListener("click", testStopTimer);
    boutTimeButton.addEventListener("click", () => {
      if (appState.breakTimerRunning) {
        endPeriodBreak();
      } else {
        toggleTimer();
      }
    });

    // Right-click on bout-time button opens time modification modal
    boutTimeButton.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      openTimeModModal();
    });

    // Long-press on bout-time button opens time modification modal
    attachLongPress(boutTimeButton, () => openTimeModModal());

    updateBoutTimeDisplay();

    // ===================================================================
    // LONG-PRESS HELPER (touch devices)
    // ===================================================================
    function attachLongPress(element, callback, delay = 500) {
      let timer = null;
      let longPressed = false;
      element.addEventListener('touchstart', (e) => {
        longPressed = false;
        timer = setTimeout(() => {
          timer = null;
          longPressed = true;
          callback();
        }, delay);
      }, { passive: true });
      element.addEventListener('touchend', (e) => {
        if (timer !== null) { clearTimeout(timer); timer = null; }
        if (longPressed) {
          // Prevent the subsequent click event from toggling the timer
          e.preventDefault();
          longPressed = false;
        }
      });
      element.addEventListener('touchmove', () => {
        if (timer !== null) { clearTimeout(timer); timer = null; }
      });
    }

    // ===================================================================
    // TIME MODIFICATION MODE
    // ===================================================================
    function isTimeModModalOpen() {
      return document.getElementById('time-mod-modal').style.display !== 'none';
    }

    function openTimeModModal(timerKey = null) {
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return;

      // For bout time only: require timer to be stopped to avoid race conditions.
      if (!timerKey && appState.timerRunning) {
        return;
      }

      appState.timeModTarget = timerKey;

      const modal = document.getElementById('time-mod-modal');
      const input = document.getElementById('time-mod-input');
      const error = document.getElementById('time-mod-error');
      const title = document.getElementById('time-mod-title');

      if (timerKey === 'correctionBoutTime') {
        // Correction mode: modify the bout time of the event at the cursor
        const corrEvent = appState.timeModCorrectionEvent;
        title.textContent = 'Ereigniszeit korrigieren [T]';
        document.getElementById('time-mod-hint').textContent = 'Abgelaufene Kampfzeit eingeben (M:SS)';
        const totalSeconds = Math.floor(corrEvent.boutTime100ms / 10);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        input.value = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      } else if (timerKey) {
        // Injury / blood time modification — pre-fill with current elapsed time
        title.textContent = `${INJURY_TIMER_LABELS[timerKey]} ändern`;
        document.getElementById('time-mod-hint').textContent = 'Abgelaufene Zeit eingeben (M:SS)';
        const currentTime100ms = appState.injuryTimers[timerKey].time100ms;
        const totalSeconds = Math.floor(currentTime100ms / 10);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        input.value = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      } else {
        // Bout (period) time modification — pre-fill with remaining period time
        title.textContent = 'Kampfzeit ändern [TT]';
        document.getElementById('time-mod-hint').textContent = 'Verbleibende Zeit eingeben (M:SS)';
        const totalSeconds = Math.floor(appState.periodTime100ms / 10);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        input.value = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }

      input.classList.remove('invalid');
      error.style.display = 'none';

      modal.style.display = 'flex';
      input.focus();
      input.select();

      appState.keyBuffer = [];
      updateNextEventDisplay();
    }

    function closeTimeModModal() {
      document.getElementById('time-mod-modal').style.display = 'none';
      document.getElementById('time-mod-input').blur();
      appState.keyBuffer = [];
      updateNextEventDisplay();
    }

    function confirmTimeModChange() {
      const input = document.getElementById('time-mod-input');
      const error = document.getElementById('time-mod-error');
      const val = input.value.trim();

      const match = val.match(/^(\d+):([0-5]\d)$/);
      if (!match) {
        input.classList.add('invalid');
        error.textContent = 'Ungültiges Format. Bitte M:SS eingeben.';
        error.style.display = '';
        input.focus();
        input.select();
        return;
      }

      const minutes = parseInt(match[1]);
      const seconds = parseInt(match[2]);
      const newTime100ms = (minutes * 60 + seconds) * 10;

      const timerKey = appState.timeModTarget;

      if (timerKey === 'correctionBoutTime') {
        // Correction mode: modify the bout time of the event at cursor position
        const corrEvent = appState.timeModCorrectionEvent;
        if (!corrEvent) { closeTimeModModal(); return; }

        // Validate: new time must not exceed the current cumulated bout time
        const maxBoutTime100ms = appState.boutTime100ms;
        if (newTime100ms > maxBoutTime100ms) {
          input.classList.add('invalid');
          error.textContent = 'Eingegebene Zeit überschreitet die aktuelle Kampfzeit.';
          error.style.display = '';
          input.focus();
          input.select();
          return;
        }

        // Find insertion point: first effective event with boutTime > newTime (excluding
        // the event being replaced and PeriodEnd).
        const effectiveForSort = getEffectiveBoutEvents();
        const insertBeforeEvent = effectiveForSort.find(e =>
          e.seq !== corrEvent.seq && e.boutTime100ms > newTime100ms
        );

        // Remove any existing corrections for this event (superseded by time modification)
        appState.correctionBuffer = appState.correctionBuffer.filter(c => c.refSeq !== corrEvent.seq);

        appState.correctionBuffer.push({
          timeModified: true,
          refSeq: corrEvent.seq,
          oldBoutTime100ms: corrEvent.boutTime100ms,
          newBoutTime100ms: newTime100ms,
          eventType: corrEvent.eventType,
          insertBefore: insertBeforeEvent ? insertBeforeEvent.seq : null
        });

        // Move cursor to the newly created virtual time-modified event (tm- seq)
        const tmSeq = `tm-${corrEvent.seq}`;
        const newCursorableEvents = getCursorableEvents();
        const tmIdx = newCursorableEvents.findIndex(e => e.seq === tmSeq);
        if (tmIdx >= 0) {
          appState.cursorIndex = tmIdx;
        } else if (newCursorableEvents.length === 0) {
          appState.cursorIndex = null;
        } else if (appState.cursorIndex !== null && appState.cursorIndex >= newCursorableEvents.length) {
          appState.cursorIndex = newCursorableEvents.length - 1;
        }

        closeTimeModModal();
        updateTimeline();
        showContextMenuAtCursor();
        updateScores();
        console.log('Correction time modification applied:', corrEvent.seq, '->', newTime100ms);
        return;
      }

      if (timerKey) {
        // Injury / blood time modification
        const maxTime100ms = getInjuryTimerMax(timerKey);
        if (newTime100ms > maxTime100ms) {
          input.classList.add('invalid');
          error.textContent = 'Eingegebene Zeit überschreitet die Maximalzeit.';
          error.style.display = '';
          input.focus();
          input.select();
          return;
        }

        const oldTime100ms = appState.injuryTimers[timerKey].time100ms;
        appState.injuryTimers[timerKey].time100ms = newTime100ms;
        updateInjuryTimerDisplay(timerKey);

        recordEvent({
          eventType: `T_${timerKey}_Modified`,
          boutTime100ms: oldTime100ms,
          newTime: newTime100ms
        });
      } else {
        // Bout (period) time modification
        // Validate against ruleset-defined period length. If the entered
        // remaining time exceeds the configured period length, show an error
        // and keep the modal open so the user can correct the value.
        const ruleset = loadEmbeddedRuleset();
        const maxPeriodTime100ms = (ruleset?.periodTimesInSeconds?.[appState.currentPeriodIndex] ?? 180) * 10;
        if (newTime100ms > maxPeriodTime100ms) {
          input.classList.add('invalid');
          error.textContent = 'Eingegebene Zeit überschreitet die Periodenlänge.';
          error.style.display = '';
          input.focus();
          input.select();
          return;
        }

        // Compute cumulated boutTime by adjusting the current elapsed offset:
        // newBoutTime = boutTime + (oldRemainingPeriodTime - newRemainingPeriodTime)
        const newBoutTime100ms = appState.boutTime100ms + appState.periodTime100ms - newTime100ms;
        const oldBoutTime100ms = appState.boutTime100ms;

        appState.boutTime100ms = newBoutTime100ms;
        appState.periodTime100ms = newTime100ms;
        updateBoutTimeDisplay();

        recordEvent({
          eventType: 'T_Modified',
          boutTime100ms: oldBoutTime100ms,
          newTime: newBoutTime100ms
        });
      }

      closeTimeModModal();
    }

    document.getElementById('time-mod-confirm').addEventListener('click', confirmTimeModChange);
    document.getElementById('time-mod-cancel').addEventListener('click', closeTimeModModal);

    // Handle Enter / Escape inside the modal input without propagating to
    // the main keydown handler.
    document.getElementById('time-mod-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.stopPropagation();
        confirmTimeModChange();
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        e.stopPropagation();
        closeTimeModModal();
      }
    });

    // ===================================================================
    // EVENT RECORDING
    // ===================================================================
    function recordEvent(eventData) {
      appState.sequenceCounter++;
      const event = {
        seq: appState.sequenceCounter,
        timestamp: new Date().toISOString(),
        ...eventData
      };
      appState.events.push(event);

      // Delete activity timer when the wrestler whose timer is running scores points
      const pointMatch = event.eventType.match(/^[1245](R|B)$/);
      if (pointMatch) {
        const timerKey = pointMatch[1] === 'R' ? 'AR' : 'AB';
        if (appState.activityTimers[timerKey].active) {
          deleteActivityTimer(timerKey, true); // silent — updateTimeline() follows
        }
      }
      
      // Update UI after recording event
      updateScores();
      updateTimeline();
      
      console.log('Event recorded:', event);
      return event;
    }

    // ===================================================================
    // STATE MANAGEMENT
    // ===================================================================
    const releaseCompleteButton = document.getElementById('release-complete-button');
    const exportButton = document.getElementById('export-button');
    const boutInfoField = document.getElementById('bout-info');
    const styleSelect = document.getElementById('style-select');
    const rulesetSelect = document.getElementById('ruleset-select');
    const timeline = document.getElementById('timeline');

    function populateVictoryTypes() {
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const ruleset = loadEmbeddedRuleset();
      victoryTypeSelect.innerHTML = '<option value="-">-</option>';
      if (ruleset && Array.isArray(ruleset.victoryTypes)) {
        ruleset.victoryTypes.forEach(vt => {
          const option = document.createElement('option');
          option.value = vt.type;
          option.textContent = `${vt.type}-${vt.description}`;
          option.dataset.classificationPoints = JSON.stringify(vt.classificationPoints);
          option.dataset.description = vt.description;
          victoryTypeSelect.appendChild(option);
        });
      }
    }

    // Toggle disabled state on all event buttons and the bout-time button.
    function setEventButtonsFrozen(frozen) {
      document.querySelectorAll('.event-btn').forEach(btn => { btn.disabled = frozen; });
      document.getElementById('bout-time-button').disabled = frozen;
    }

    // Lock or unlock the top-bar scoresheet header fields.
    function lockTopBar(locked) {
      boutInfoField.disabled = locked;
      styleSelect.disabled   = locked;
      rulesetSelect.disabled = locked;
    }

    function applyState(state) {
      appState.mode = state;

      const form         = document.getElementById('completion-form');
      const formControls = form.querySelectorAll('select, input');

      // Freeze or unfreeze the completion form controls.
      const freezeForm   = () => { formControls.forEach(el => { el.disabled = true;  }); };
      const unfreezeForm = () => { formControls.forEach(el => { el.disabled = false; }); };

      // State-specific labels, locks and visibility.
      // Format: [buttonLabel, freezeForm, freezeEventBtns, showExport, lockTopBar]
      const cfg = {
        'New':         ['Freigeben [F4]',   true,  true,  false, false],
        'Recording':   ['Fertigstellen [F4]', true, false, false, true ],
        'Completing':  ['Abschließen [F4]', false, false, false, true ],
        'Completed':   ['Korrigieren [F4]', true,  true,  true,  true ],
        'Re-released': ['Abschließen [F4]', false, false, false, false],
      };

      const [label, doFreezeForm, doFreezeEvt, showExport, doLockTopBar] = cfg[state];
      releaseCompleteButton.textContent = label;
      doFreezeForm ? freezeForm() : unfreezeForm();
      setEventButtonsFrozen(doFreezeEvt);
      exportButton.style.display = showExport ? '' : 'none';
      lockTopBar(doLockTopBar);

      updateTimeline();
    }

    function releaseScoresheet() {
      if (appState.mode !== 'New') return;

      appState.createdAt = new Date().toISOString();
      recordEvent({ eventType: 'ScoresheetReleased' });
      applyState('Recording');

      console.log('Scoresheet released for recording');
    }

    function startCompleting() {
      if (appState.mode !== 'Recording') return;

      // Stop timer if running
      if (appState.timerRunning) {
        stopTimer();
      }

      applyState('Completing');
      console.log('Entering Completing state');
    }

    function readFormAndComplete() {
      const winnerSelect = document.getElementById('compl-winner');
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const redInput = document.getElementById('compl-points-red');
      const blueInput = document.getElementById('compl-points-blue');

      const winner = winnerSelect.value === '-' ? 'none' : winnerSelect.value;
      const victoryType = victoryTypeSelect.value;
      const selectedOption = victoryTypeSelect.options[victoryTypeSelect.selectedIndex];
      const victoryDescription = selectedOption ? (selectedOption.dataset.description || '') : '';
      const redPoints = parseInt(redInput.value) || 0;
      const bluePoints = parseInt(blueInput.value) || 0;

      // Store as [winner, loser] regardless of which colour side won
      const winnerPoints = winner === 'blue' ? bluePoints : redPoints;
      const loserPoints  = winner === 'blue' ? redPoints  : bluePoints;

      completeScoresheet(winner, victoryType, victoryDescription, [winnerPoints, loserPoints]);
    }

    function completeScoresheet(winner, victoryType, victoryDescription, classificationPoints) {
      if (appState.mode !== 'Completing' && appState.mode !== 'Re-released') return;

      appState.completed = true;
      appState.completedAt = new Date().toISOString();
      appState.winner = winner;
      appState.victoryType = victoryType;
      appState.victoryDescription = victoryDescription;
      appState.classificationPoints = classificationPoints;

      recordEvent({
        eventType: 'ScoresheetCompleted',
        victoryType: victoryType,
        classificationPoints: classificationPoints
      });

      applyState('Completed');
      console.log('Scoresheet completed:', victoryType, classificationPoints);
    }

    function rereleaseScoresheet() {
      if (appState.mode !== 'Completed') return;

      applyState('Re-released');
      console.log('Scoresheet re-released for correction');
    }

    function updateCompletionPoints() {
      const form = document.getElementById('completion-form');
      const winnerSelect = document.getElementById('compl-winner');
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const redInput = document.getElementById('compl-points-red');
      const blueInput = document.getElementById('compl-points-blue');

      const selectedOption = victoryTypeSelect.options[victoryTypeSelect.selectedIndex];
      if (!selectedOption) return;

      let winnerPts = 0;
      let loserPts = 0;
      const winner = winnerSelect.value;
      try {
        const cp = JSON.parse(selectedOption.dataset.classificationPoints || 'null');
        if (cp) {
          const context = getBoutContext(winner !== '-' ? winner : undefined);
          const resolved = resolveClassificationPoints(cp, context);
          winnerPts = resolved.winner;
          loserPts = resolved.loser;
        }
      } catch (e) {
        // ignore parse errors
      }

      if (winner === 'blue') {
        redInput.value = loserPts;
        blueInput.value = winnerPts;
      } else {
        redInput.value = winnerPts;
        blueInput.value = loserPts;
      }

      // Color background by winner
      form.classList.toggle('winner-red', winner === 'red');
      form.classList.toggle('winner-blue', winner === 'blue');
    }

    function autoUpdateCompletionForm() {
      const ruleset = loadEmbeddedRuleset();
      if (!ruleset) return;

      const scores = calculateScores(getEffectiveBoutEvents());

      // Determine winner from scores; apply tie-breaking when equal
      let winner = '-';
      if (scores.red > scores.blue) winner = 'red';
      else if (scores.blue > scores.red) winner = 'blue';
      else {
        const tbWinner = findTiebreakWinner(getEffectiveBoutEvents());
        if (tbWinner) winner = tbWinner;
      }

      const context = getBoutContext(winner !== '-' ? winner : undefined);

      // 1. Find the first victory type whose top-level condition is met (skip types without conditions).
      // The ruleset array order determines priority when multiple conditions could match.
      let matchingVT = ruleset.victoryTypes.find(vt => {
        if (!vt.condition) return false;
        return evaluateCondition(vt.condition, context);
      });

      // 2. If no top-level condition matched and there is a winner, check victory types whose
      //    classificationPoints.winner is conditional (an array) – the resolved value > 0 means
      //    the current score difference falls within one of those defined bands.
      if (!matchingVT && winner !== '-') {
        matchingVT = ruleset.victoryTypes.find(vt => {
          if (vt.condition) return false; // already handled above
          const cp = vt.classificationPoints;
          if (!cp || !Array.isArray(cp.winner)) return false;
          return resolveClassificationPoints(cp, context).winner > 0;
        });
      }

      document.getElementById('compl-winner').value = winner;
      document.getElementById('compl-victory-type').value = matchingVT ? matchingVT.type : '-';
      updateCompletionPoints();
    }

    document.getElementById('compl-winner').addEventListener('change', updateCompletionPoints);
    document.getElementById('compl-victory-type').addEventListener('change', updateCompletionPoints);
    exportButton.addEventListener('click', downloadExport);

    // Centralised action for the release/complete button and F4 shortcut.
    function handleReleaseCompleteAction() {
      switch (appState.mode) {
        case 'New':         releaseScoresheet();  break;
        case 'Recording':   startCompleting();    break;
        case 'Completing':  readFormAndComplete(); break;
        case 'Completed':   rereleaseScoresheet(); break;
        case 'Re-released': readFormAndComplete(); break;
      }
    }

    releaseCompleteButton.addEventListener('click', () => {
      handleReleaseCompleteAction();
      // Remove focus so Space won't re-trigger this button
      releaseCompleteButton.blur();
    });

    // Prevent Space from activating the button when focused – Space toggles the timer.
    releaseCompleteButton.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.key === ' ') e.preventDefault();
    });

    // ===================================================================
    // SCORE CALCULATION
    // ===================================================================
    const scoreRedDisplay = document.getElementById('score-red');
    const scoreBlueDisplay = document.getElementById('score-blue');

    /**
     * Exchange the eventType of two entries in-place within a result array.
     * @param {object[]} result  Array of event objects to mutate.
     * @param {*} seq1  seq of the first event.
     * @param {*} seq2  seq of the second event.
     * @param {boolean} annotate  When true, also sets originalEventType so the
     *   timeline can render the two-line correction (struck-through old / new) display.
     */
    function applyEventTypeSwap(result, seq1, seq2, annotate = false) {
      const idx1 = result.findIndex(e => e.seq === seq1);
      const idx2 = result.findIndex(e => e.seq === seq2);
      if (idx1 < 0 || idx2 < 0) return;
      const type1 = result[idx1].eventType;
      const type2 = result[idx2].eventType;
      result[idx1] = { ...result[idx1], eventType: type2, ...(annotate ? { originalEventType: type1 } : {}) };
      result[idx2] = { ...result[idx2], eventType: type1, ...(annotate ? { originalEventType: type2 } : {}) };
    }

    /**
     * Returns the effective list of bout events, applying committed
     * EventModified / EventDeleted / EventInserted corrections from appState.events and
     * any pending corrections from appState.correctionBuffer.
     */
    function getEffectiveBoutEvents() {
      const rawBoutEvents = appState.events.filter(e =>
        e.boutTime100ms !== undefined &&
        !e.eventType.startsWith('T_') &&
        e.eventType !== 'ScoresheetReleased' &&
        e.eventType !== 'ScoresheetCompleted' &&
        e.eventType !== 'EventModified' &&
        e.eventType !== 'EventDeleted' &&
        e.eventType !== 'EventInserted' &&
        e.eventType !== 'EventSwapped'
      );

      const deletedSeqs = new Set();
      const modifiedTypes = new Map();

      appState.events.forEach(e => {
        if (e.eventType === 'EventModified' && e.refSeq !== undefined && e.newEventType) {
          modifiedTypes.set(e.refSeq, e.newEventType);
        }
        if (e.eventType === 'EventDeleted' && e.refSeq !== undefined) {
          deletedSeqs.add(e.refSeq);
        }
      });

      appState.correctionBuffer.forEach(c => {
        if (c.deleted) {
          deletedSeqs.add(c.refSeq);
        } else if (c.newEventType) {
          modifiedTypes.set(c.refSeq, c.newEventType);
        } else if (c.timeModified) {
          // Time modification: treat original event as deleted; new virtual event added below
          deletedSeqs.add(c.refSeq);
        }
      });

      const result = rawBoutEvents
        .filter(e => !deletedSeqs.has(e.seq))
        .map(e => {
          const effectiveType = modifiedTypes.get(e.seq);
          return effectiveType ? { ...e, eventType: effectiveType } : e;
        });

      // Apply committed EventInserted events: insert virtual events at the right positions
      appState.events
        .filter(e => e.eventType === 'EventInserted')
        .forEach(ins => {
          if (deletedSeqs.has(ins.seq)) return; // skip if itself deleted
          const effectiveType = modifiedTypes.get(ins.seq) || ins.insertedEventType;
          const insertedEvent = {
            seq: ins.seq,
            boutTime100ms: ins.boutTime100ms,
            eventType: effectiveType
          };
          const idx = result.findIndex(e => e.seq === ins.refSeq);
          if (idx >= 0) {
            result.splice(idx, 0, insertedEvent);
          } else {
            result.push(insertedEvent);
          }
        });

      // Apply committed EventSwapped events (exchange event types of the two referenced events)
      appState.events
        .filter(e => e.eventType === 'EventSwapped')
        .forEach(swap => applyEventTypeSwap(result, swap.refSeq1, swap.refSeq2));

      // Apply pending swaps from correctionBuffer
      appState.correctionBuffer
        .filter(c => c.swapped)
        .forEach(swap => applyEventTypeSwap(result, swap.refSeq1, swap.refSeq2));

      // Apply pending insertions from correctionBuffer so cursor can point to them.
      // Pending-inserted virtual events use a synthetic seq with the prefix 'pi-'
      // (short for "pending insert") followed by the insertBefore seq value.
      appState.correctionBuffer
        .filter(c => c.insertedEventType)
        .forEach(ins => {
          const insertedEvent = {
            seq: `pi-${ins.insertBefore}`,
            boutTime100ms: ins.boutTime100ms,
            eventType: ins.insertedEventType
          };
          const idx = result.findIndex(e => e.seq === ins.insertBefore);
          if (idx >= 0) {
            result.splice(idx, 0, insertedEvent);
          } else {
            result.push(insertedEvent);
          }
        });

      // Apply live swap preview (during swap mode navigation, before Enter is pressed)
      if (appState.inSwapMode && appState.swapOriginIndex !== null &&
          appState.cursorIndex !== null && appState.cursorIndex !== appState.swapOriginIndex) {
        const cursorableResult = result.filter(e => e.eventType !== 'PeriodEnd');
        const originEvent = cursorableResult[appState.swapOriginIndex];
        const targetEvent = cursorableResult[appState.cursorIndex];
        if (originEvent && targetEvent) {
          applyEventTypeSwap(result, originEvent.seq, targetEvent.seq);
        }
      }

      // Apply pending time modifications from correctionBuffer:
      // insert a new virtual event at the correct chronological position.
      appState.correctionBuffer
        .filter(c => c.timeModified)
        .forEach(c => {
          const newEvent = {
            seq: `tm-${c.refSeq}`,
            boutTime100ms: c.newBoutTime100ms,
            eventType: c.eventType
          };
          const insertIdx = result.findIndex(e => e.boutTime100ms > c.newBoutTime100ms);
          if (insertIdx >= 0) {
            result.splice(insertIdx, 0, newEvent);
          } else {
            result.push(newEvent);
          }
        });

      return result;
    }

    /** Predicate for filtering cursorsable events: excludes PeriodEnd entries. */
    function isCursorableEvent(e) {
      return e.eventType !== 'PeriodEnd';
    }

    /** Returns true if event is a virtual pending event (pi- or tm- synthetic seq). */
    function isVirtualEvent(e) {
      return typeof e.seq === 'string';
    }

    /** Returns cursorsable bout events (excluding PeriodEnd entries). */
    function getCursorableEvents() {
      return getEffectiveBoutEvents().filter(isCursorableEvent);
    }

    /**
     * Returns bout events for timeline rendering in correction mode.
     * Committed corrections are applied; pending corrections (correctionBuffer) are annotated:
     *   – pending-deleted:  { ...event, pendingDeleted: true }
     *   – pending-modified: { ...event, eventType: newType, originalEventType: currentType }
     *   – pending-inserted: { ..., isPendingInserted: true }
     */
    function getBoutEventsForTimelineRendering() {
      const rawBoutEvents = appState.events.filter(e =>
        e.boutTime100ms !== undefined &&
        !e.eventType.startsWith('T_') &&
        e.eventType !== 'ScoresheetReleased' &&
        e.eventType !== 'ScoresheetCompleted' &&
        e.eventType !== 'EventModified' &&
        e.eventType !== 'EventDeleted' &&
        e.eventType !== 'EventInserted' &&
        e.eventType !== 'EventSwapped'
      );

      const committedDeletedSeqs = new Set();
      const committedModifiedTypes = new Map();
      appState.events.forEach(e => {
        if (e.eventType === 'EventModified' && e.refSeq !== undefined && e.newEventType) {
          committedModifiedTypes.set(e.refSeq, e.newEventType);
        }
        if (e.eventType === 'EventDeleted' && e.refSeq !== undefined) {
          committedDeletedSeqs.add(e.refSeq);
        }
      });

      const pendingDeletedSeqs = new Set();
      const pendingModifiedTypes = new Map();
      const pendingTimeMods = new Map(); // refSeq → correction object
      appState.correctionBuffer.forEach(c => {
        if (c.deleted) pendingDeletedSeqs.add(c.refSeq);
        else if (c.newEventType) pendingModifiedTypes.set(c.refSeq, c.newEventType);
        else if (c.timeModified) {
          pendingDeletedSeqs.add(c.refSeq);
          pendingTimeMods.set(c.refSeq, c);
        }
      });

      const result = rawBoutEvents
        .filter(e => !committedDeletedSeqs.has(e.seq))
        .map(e => {
          const committedType = committedModifiedTypes.get(e.seq);
          const currentType = committedType || e.eventType;
          if (pendingDeletedSeqs.has(e.seq)) {
            // Mark whether it's a time-modification deletion (for time-highlight rendering)
            const isTimeMod = pendingTimeMods.has(e.seq);
            return { ...e, eventType: currentType, pendingDeleted: true, ...(isTimeMod ? { pendingTimeModified: true } : {}) };
          }
          if (pendingModifiedTypes.has(e.seq)) {
            return { ...e, eventType: pendingModifiedTypes.get(e.seq), originalEventType: currentType };
          }
          return { ...e, eventType: currentType };
        });

      // Apply committed EventInserted events
      appState.events
        .filter(e => e.eventType === 'EventInserted')
        .forEach(ins => {
          if (committedDeletedSeqs.has(ins.seq)) return;
          const committedType = committedModifiedTypes.get(ins.seq);
          const currentType = committedType || ins.insertedEventType;
          let insertedEvent;
          if (pendingDeletedSeqs.has(ins.seq)) {
            insertedEvent = { seq: ins.seq, boutTime100ms: ins.boutTime100ms, eventType: currentType, pendingDeleted: true };
          } else if (pendingModifiedTypes.has(ins.seq)) {
            insertedEvent = { seq: ins.seq, boutTime100ms: ins.boutTime100ms, eventType: pendingModifiedTypes.get(ins.seq), originalEventType: currentType };
          } else {
            insertedEvent = { seq: ins.seq, boutTime100ms: ins.boutTime100ms, eventType: currentType };
          }
          const idx = result.findIndex(e => e.seq === ins.refSeq);
          if (idx >= 0) {
            result.splice(idx, 0, insertedEvent);
          } else {
            result.push(insertedEvent);
          }
        });

      // Apply committed EventSwapped events (just exchange types, no annotation needed after confirmation)
      appState.events
        .filter(e => e.eventType === 'EventSwapped')
        .forEach(swap => applyEventTypeSwap(result, swap.refSeq1, swap.refSeq2));

      // Apply pending swaps from correctionBuffer (annotate with originalEventType for two-line display)
      appState.correctionBuffer
        .filter(c => c.swapped)
        .forEach(swap => applyEventTypeSwap(result, swap.refSeq1, swap.refSeq2, true));

      // Apply live swap preview (during swap mode navigation, before Enter is pressed)
      if (appState.inSwapMode && appState.swapOriginIndex !== null &&
          appState.cursorIndex !== null && appState.cursorIndex !== appState.swapOriginIndex) {
        const cursorableResult = result.filter(e => e.eventType !== 'PeriodEnd');
        const originEvent = cursorableResult[appState.swapOriginIndex];
        const targetEvent = cursorableResult[appState.cursorIndex];
        if (originEvent && targetEvent) {
          applyEventTypeSwap(result, originEvent.seq, targetEvent.seq, true);
        }
      }

      // Apply pending insertions from correctionBuffer
      appState.correctionBuffer
        .filter(c => c.insertedEventType)
        .forEach(ins => {
          const insertedEvent = {
            seq: `pi-${ins.insertBefore}`,
            boutTime100ms: ins.boutTime100ms,
            eventType: ins.insertedEventType,
            isPendingInserted: true
          };
          const idx = result.findIndex(e => e.seq === ins.insertBefore);
          if (idx >= 0) {
            result.splice(idx, 0, insertedEvent);
          } else {
            result.push(insertedEvent);
          }
        });

      // Apply pending time modifications from correctionBuffer:
      // insert a new virtual pending-inserted event at the correct chronological position.
      appState.correctionBuffer
        .filter(c => c.timeModified)
        .forEach(c => {
          const newEvent = {
            seq: `tm-${c.refSeq}`,
            boutTime100ms: c.newBoutTime100ms,
            eventType: c.eventType,
            isPendingInserted: true,
            isNewTimeModified: true
          };
          const insertIdx = result.findIndex(e => e.boutTime100ms > c.newBoutTime100ms);
          if (insertIdx >= 0) {
            result.splice(insertIdx, 0, newEvent);
          } else {
            result.push(newEvent);
          }
        });

      return result;
    }

    function calculateScores(events) {
      const scores = { red: 0, blue: 0 };
      
      events.forEach(e => {
        // Technical points: 1R, 2R, 4R, 5R, 1B, 2B, 4B, 5B
        const pointMatch = e.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) {
          const points = parseInt(pointMatch[1]);
          const side = pointMatch[2] === 'R' ? 'red' : 'blue';
          scores[side] += points;
        }
        
        // Cautions award points to opponent: 0R1B, 0R2B, 0B1R, 0B2R
        const cautionMatch = e.eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) {
          const points = parseInt(cautionMatch[2]);
          const recipient = cautionMatch[3] === 'R' ? 'red' : 'blue';
          scores[recipient] += points;
        }
      });
      
      return scores;
    }

    function updateScores() {
      const scores = calculateScores(getEffectiveBoutEvents());
      scoreRedDisplay.textContent = scores.red;
      scoreBlueDisplay.textContent = scores.blue;
      autoUpdateCompletionForm();
    }

    // ===================================================================
    // TIMELINE RENDERING
    // ===================================================================
    function updateTimeline() {
      timeline.innerHTML = '';
      
      const effectiveBoutEvents = getEffectiveBoutEvents();

      // Determine the seq of the cursored event (for cursor ring rendering)
      let cursorSeq = null;
      if (appState.inCorrectionMode && appState.cursorIndex !== null) {
        const cursorableEvents = effectiveBoutEvents.filter(isCursorableEvent);
        const cursorEvent = cursorableEvents[appState.cursorIndex];
        if (cursorEvent) cursorSeq = cursorEvent.seq;
      }

      // Determine the seq of the swap origin event (for swap-mode visual)
      let swapOriginSeq = null;
      if (appState.inSwapMode && appState.swapOriginIndex !== null &&
          appState.cursorIndex !== appState.swapOriginIndex) {
        const cursorableEvents = effectiveBoutEvents.filter(isCursorableEvent);
        const swapOriginEvent = cursorableEvents[appState.swapOriginIndex];
        if (swapOriginEvent) swapOriginSeq = swapOriginEvent.seq;
      }

      // Show correction mode indicator
      timeline.classList.toggle('correction-mode', appState.inCorrectionMode);

      // In correction mode, use annotated events so pending-deleted/modified are visible
      const renderEvents = appState.inCorrectionMode
        ? getBoutEventsForTimelineRendering()
        : effectiveBoutEvents;

      let runningRed = 0, runningBlue = 0, periodRed = 0, periodBlue = 0, periodCount = 0;
      renderEvents.forEach(event => {
        // In insert mode, inject provisional insert entry before the cursor event
        if (appState.inInsertMode && event.seq === cursorSeq) {
          const insertEntry = createInsertModeEntry(appState.keyBuffer);
          timeline.appendChild(insertEntry);
        }

        // Skip pending-deleted events when accumulating period/running scores
        if (!event.pendingDeleted) {
          const pointMatch = event.eventType.match(/^([1245])(R|B)$/);
          if (pointMatch) {
            const pts = parseInt(pointMatch[1]);
            if (pointMatch[2] === 'R') { runningRed += pts; periodRed += pts; }
            else { runningBlue += pts; periodBlue += pts; }
          }
          const cautionMatch = event.eventType.match(/^0([RB])([12])([RB])$/);
          if (cautionMatch) {
            const pts = parseInt(cautionMatch[2]);
            if (cautionMatch[3] === 'R') { runningRed += pts; periodRed += pts; }
            else { runningBlue += pts; periodBlue += pts; }
          }
        }
        let context = null;
        if (event.eventType === 'PeriodEnd') {
          periodCount++;
          context = { periodNumber: periodCount, scoreRed: periodRed, scoreBlue: periodBlue };
          periodRed = 0;
          periodBlue = 0;
        }
        const isCursor = event.seq === cursorSeq;
        const isSwapOrigin = swapOriginSeq !== null && event.seq === swapOriginSeq;
        const entry = createTimelineEntry(event, context, isCursor, isSwapOrigin);
        if (event.pendingDeleted) entry.classList.add('pending-deleted');
        timeline.appendChild(entry);
      });
      
      // Add next-event entry if in Recording or Completing mode and NOT in correction mode
      if (!appState.inCorrectionMode && (appState.mode === 'Recording' || appState.mode === 'Completing')) {
        const nextEventEntry = document.createElement('div');
        nextEventEntry.id = 'next-event';
        nextEventEntry.className = 'entry';
        // Placeholder – will be filled by updateNextEventDisplay()
