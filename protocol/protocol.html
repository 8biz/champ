        nextEventEntry.innerHTML = `
          <div class="entry-box next cursor">+</div>
          <div class="entry-time">Next</div>
        `;
        timeline.appendChild(nextEventEntry);
        updateNextEventDisplay();
      }

      // Scroll the cursored entry into view
      if (appState.inCorrectionMode) {
        const cursorEntry = timeline.querySelector('.entry-box.cursor')?.closest('.entry');
        if (cursorEntry) cursorEntry.scrollIntoView({ block: 'nearest', inline: 'nearest' });
      }
    }

    /** Returns the main color class ('red', 'blue', 'next') for an event type string. */
    function eventColorClass(type) {
      const ptMatch = type.match(/^[1245PA](R|B)$/); // includes PR/PB and AR/AB
      if (ptMatch) return ptMatch[1] === 'R' ? 'red' : 'blue';
      const cautionMatch = type.match(/^0([RB])/);
      if (cautionMatch) return cautionMatch[1] === 'R' ? 'red' : 'blue';
      return 'next';
    }

    function createTimelineEntry(event, context, isCursor = false, isSwapOrigin = false) {
      const entry = document.createElement('div');
      entry.className = 'entry';

      // Store seq for click-based correction-mode entry (non-PeriodEnd bout events only)
      if (event.seq !== undefined && event.eventType !== 'PeriodEnd') {
        entry.dataset.seq = event.seq;
      }

      const eventType = event.eventType;
      const swapModeClass = isCursor && appState.inSwapMode ? ' swap-mode' : '';
      const cursorClass = isCursor ? ` cursor${swapModeClass}` : '';
      const insertedClass = event.isPendingInserted ? ' pending-inserted' : '';
      let boxHtml = '';
      
      if (event.originalEventType) {
        // Pending modification: two-line entry — old name (struck through) over new name
        const newColorClass = eventColorClass(eventType);
        boxHtml = `
          <div class="entry-box correction ${newColorClass}${cursorClass}">
            <div class="caution-row old">${event.originalEventType}</div>
            <div class="caution-row ${newColorClass}">${eventType}</div>
          </div>
        `;
      } else if (eventType === 'PeriodEnd' && context) {
        const { periodNumber, scoreRed, scoreBlue } = context;
        const winnerClass = scoreRed > scoreBlue ? 'red' : (scoreBlue > scoreRed ? 'blue' : 'neutral');
        boxHtml = `
          <div class="entry-box period-end${cursorClass}">
            <div class="caution-row neutral">#${periodNumber}</div>
            <div class="caution-row ${winnerClass}">${scoreRed}:${scoreBlue}</div>
          </div>
        `;
      } else {
        // Check if it's a caution event (0R1B, 0R2B, 0B1R, 0B2R)
        const cautionMatch = eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) {
          const cautionSide = cautionMatch[1] === 'R' ? 'red' : 'blue';
          const pointSide = cautionMatch[3] === 'R' ? 'red' : 'blue';
          boxHtml = `
            <div class="entry-box caution ${cautionSide === 'red' ? 'red' : 'blue'}${insertedClass}${cursorClass}">
              <div class="caution-row ${cautionSide}">0${cautionMatch[1]}</div>
              <div class="caution-row ${pointSide}">${cautionMatch[2]}${cautionMatch[3]}</div>
            </div>
          `;
        } else {
          // Activity time event (AR / AB): two-row while timer is active, single row after
          const activityMatch = eventType.match(/^A([RB])$/);
          if (activityMatch) {
            const side = activityMatch[1] === 'R' ? 'red' : 'blue';
            const timerKey = eventType; // 'AR' or 'AB'
            const at = appState.activityTimers[timerKey];
            const isTimerActive = at.active && at.seq === event.seq;
            if (isTimerActive) {
              boxHtml = `
                <div class="entry-box caution ${side}${insertedClass}${cursorClass}">
                  <div class="caution-row ${side}">${eventType}</div>
                  <div class="caution-row ${side} activity-timer-row">${formatActivityTime(timerKey)}</div>
                </div>
              `;
            } else {
              // Timer expired or not yet started: single-row
              boxHtml = `<div class="entry-box ${side}${insertedClass}${cursorClass}">${eventType}</div>`;
            }
          } else {
            // Regular event (points or passivity)
            const colorClass = eventType.includes('R') ? 'red' : (eventType.includes('B') ? 'blue' : 'next');
            boxHtml = `<div class="entry-box ${colorClass}${insertedClass}${cursorClass}">${eventType}</div>`;
          }
        }
      }
      
      const timeModClass = (event.pendingTimeModified || event.isNewTimeModified) ? ' time-modified' : '';
      entry.innerHTML = `
        ${boxHtml}
        <div class="entry-time${timeModClass}">${formatTime100ms(event.boutTime100ms)}</div>
      `;
      
      if (isSwapOrigin) entry.classList.add('swap-origin');

      // Long-press on cursorable bout entries shows the context menu
      if (entry.dataset.seq) {
        attachLongPress(entry, () => {
          enterCorrectionModeAtSeq(entry.dataset.seq);
          showContextMenuAtCursor();
        });
      }

      return entry;
    }

    /**
     * Create a provisional insert-mode entry displayed before the cursor event
     * while the user is typing a new event type in insert mode.
     */
    function createInsertModeEntry(keyBuffer) {
      const entry = document.createElement('div');
      entry.className = 'entry insert-mode-pending';
      const data = getNextEventDisplayData(keyBuffer);
      let boxHtml;
      if (data.type === 'caution') {
        boxHtml = `
          <div class="entry-box caution ${data.cautionColor} inserted">
            <div class="caution-row ${data.cautionColor}">${data.cautionLabel}</div>
            <div class="caution-row ${data.oppColor}">${data.oppLabel}</div>
          </div>`;
      } else if (data.type === 'color') {
        boxHtml = `<div class="entry-box ${data.color} inserted">${data.text}</div>`;
      } else {
        boxHtml = `<div class="entry-box next inserted">${data.text}</div>`;
      }
      entry.innerHTML = `${boxHtml}<div class="entry-time">⊕</div>`;
      return entry;
    }

    // ===================================================================
    // NEXT-EVENT DISPLAY
    // ===================================================================
    /**
     * Derive display data from the current key buffer.
     * Returns an object describing how to render the next-event entry-box.
     */
    function getNextEventDisplayData(buffer) {
      if (buffer.length === 0) {
        return { type: 'neutral', text: '+' };
      }

      const seq = buffer.map(k => k.toUpperCase()).join('');
      const hasR = seq.includes('R');
      const hasB = seq.includes('B');
      const has0 = seq.includes('0');

      // Caution sequence: color has been identified and 0 is present
      if (has0 && (hasR || hasB)) {
        const cautionColor = hasR ? 'red' : 'blue';
        const cautionKey   = hasR ? 'R'   : 'B';
        const oppColor     = hasR ? 'blue' : 'red';
        const oppKey       = hasR ? 'B'   : 'R';
        return { type: 'caution', cautionColor, cautionLabel: '0' + cautionKey, oppColor, oppLabel: oppKey };
      }

      // Color identified without 0: use the color   
      if (hasR) return { type: 'color', color: 'red',  text: seq };
      if (hasB) return { type: 'color', color: 'blue', text: seq };

      // Neutral: digit alone, P alone, 0 alone, T alone
      return { type: 'neutral', text: seq };
    }

    /**
     * Update the #next-event entry to reflect the current key buffer state.
     * Called after every buffer mutation and when the timeline is rebuilt.
     */
    function updateNextEventDisplay() {
      const nextEvent = document.getElementById('next-event');
      if (!nextEvent) return;

      const data = getNextEventDisplayData(appState.keyBuffer);
      let boxHtml;

      if (data.type === 'caution') {
        boxHtml = `
          <div class="entry-box caution ${data.cautionColor} cursor">
            <div class="caution-row ${data.cautionColor}">${data.cautionLabel}</div>
            <div class="caution-row ${data.oppColor}">${data.oppLabel}</div>
          </div>`;
      } else if (data.type === 'color') {
        boxHtml = `<div class="entry-box ${data.color} cursor">${data.text}</div>`;
      } else {
        boxHtml = `<div class="entry-box next cursor">${data.text}</div>`;
      }

      nextEvent.innerHTML = `${boxHtml}
        <div class="entry-time">Next</div>`;
    }

    // ===================================================================
    // KEYBOARD INPUT HANDLER
    // ===================================================================
    function processKeySequence(buffer) {
      const seq = buffer.join('').toUpperCase();
      
      // Only process bout events in Recording or Completing mode
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return false;
      
      // TT: open time modification modal for bout time
      if (seq === 'TT') {
        openTimeModModal();
        return true;
      }

      // T + injury timer sequence: open time modification modal for injury/blood time
      if (seq === 'TR,' || seq === 'T,R') { openTimeModModal('IR'); return true; }
      if (seq === 'TB,' || seq === 'T,B') { openTimeModModal('IB'); return true; }
      if (seq === 'TR.' || seq === 'T.R') { openTimeModModal('BR'); return true; }
      if (seq === 'TB.' || seq === 'T.B') { openTimeModModal('BB'); return true; }

      // Space: abort period break if active, otherwise toggle timer (only in Recording mode)
      if (seq === ' ') {
        if (appState.breakTimerRunning) {
          endPeriodBreak();
          return true;
        }
        const isRecording = appState.mode === 'Recording';
        if (isRecording) toggleTimer();
        return isRecording;
      }
      
      // Technical points: R1, 1R, R2, 2R, R4, 4R, R5, 5R, B1, 1B, B2, 2B, B4, 4B, B5, 5B
      if (seq.match(/^[RB][1245]$/)) {
        const points = seq[1];
        const side = seq[0];
        recordEvent({ eventType: `${points}${side}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      if (seq.match(/^[1245][RB]$/)) {
        const points = seq[0];
        const side = seq[1];
        recordEvent({ eventType: `${points}${side}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      
      // Passivity: RP, PR, BP, PB — may become activity time (AR/AB) per ruleset
      if (seq === 'RP' || seq === 'PR') {
        if (shouldUseActivityTime('red')) {
          const event = recordEvent({ eventType: 'AR', boutTime100ms: appState.boutTime100ms });
          startActivityTimer('AR', event.seq);
        } else {
          recordEvent({ eventType: 'PR', boutTime100ms: appState.boutTime100ms });
        }
        return true;
      }
      if (seq === 'BP' || seq === 'PB') {
        if (shouldUseActivityTime('blue')) {
          const event = recordEvent({ eventType: 'AB', boutTime100ms: appState.boutTime100ms });
          startActivityTimer('AB', event.seq);
        } else {
          recordEvent({ eventType: 'PB', boutTime100ms: appState.boutTime100ms });
        }
        return true;
      }
      
      // Cautions: R01, 0R1, R02, 0R2, B01, 0B1, B02, 0B2
      if (seq.match(/^[RB]0[12]$/)) {
        const cautionSide = seq[0];
        const points = seq[2];
        const pointSide = cautionSide === 'R' ? 'B' : 'R';
        recordEvent({ eventType: `0${cautionSide}${points}${pointSide}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      if (seq.match(/^0[RB][12]$/)) {
        const cautionSide = seq[1];
        const points = seq[2];
        const pointSide = cautionSide === 'R' ? 'B' : 'R';
        recordEvent({ eventType: `0${cautionSide}${points}${pointSide}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }

      // Injury time: R, / ,R → T_IR; B, / ,B → T_IB
      if (seq === 'R,' || seq === ',R') { toggleInjuryTimer('IR'); return true; }
      if (seq === 'B,' || seq === ',B') { toggleInjuryTimer('IB'); return true; }

      // Blood time: R. / .R → T_BR; B. / .B → T_BB
      if (seq === 'R.' || seq === '.R') { toggleInjuryTimer('BR'); return true; }
      if (seq === 'B.' || seq === '.B') { toggleInjuryTimer('BB'); return true; }
      
      return false;
    }

    function isValidContinuation(buffer, key) {
      const seq = buffer.join('').toUpperCase();
      const newKey = key.toUpperCase();
      
      // Empty buffer - accept most keys
      if (buffer.length === 0) {
        return ['R', 'B', 'P', '1', '2', '4', '5', '0', ' ', 'T', ',', '.'].includes(newKey);
      }
      
      // Single key sequences
      if (buffer.length === 1) {
        if (seq === 'R') return ['1', '2', '4', '5', 'P', '0', ',', '.'].includes(newKey);
        if (seq === 'B') return ['1', '2', '4', '5', 'P', '0', ',', '.'].includes(newKey);
        if (seq === 'P') return ['R', 'B'].includes(newKey);
        if (['1', '2', '4', '5'].includes(seq)) return ['R', 'B'].includes(newKey);
        if (seq === '0') return ['R', 'B'].includes(newKey);
        if (seq === 'T') return ['T', 'R', 'B', ',', '.'].includes(newKey);
        if (seq === ',') return ['R', 'B'].includes(newKey);
        if (seq === '.') return ['R', 'B'].includes(newKey);
      }
      
      // Two key sequences
      if (buffer.length === 2) {
        if (seq === 'R0') return ['1', '2'].includes(newKey);
        if (seq === 'B0') return ['1', '2'].includes(newKey);
        if (seq === '0R') return ['1', '2'].includes(newKey);
        if (seq === '0B') return ['1', '2'].includes(newKey);
        // T + color or T + separator → expect the remaining part of the injury timer sequence
        if (seq === 'TR' || seq === 'TB') return [',', '.'].includes(newKey);
        if (seq === 'T,' || seq === 'T.') return ['R', 'B'].includes(newKey);
      }
      
      return false;
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;

      // If the time modification modal is open, let the modal input handle
      // its own keystrokes. Block F4/F8 and all other shortcuts.
      if (isTimeModModalOpen()) return;
      
      // Handle function keys directly (F4, F8)
      if (key === 'F4') {
        handleReleaseCompleteAction();
        e.preventDefault();
        return;
      }
      
      if (key === 'F8' && appState.mode === 'Completed') {
        downloadExport();
        e.preventDefault();
        return;
      }

      // Route all keys to correction mode handler when active
      if (appState.inCorrectionMode) {
        handleCorrectionModeKey(e);
        return;
      }
      
      // Escape clears buffer
      if (key === 'Escape') {
        appState.keyBuffer = [];
        updateNextEventDisplay();
        console.log('Key buffer cleared');
        return;
      }

      // ArrowLeft: enter Correction mode (only in Recording or Completing)
      if (key === 'ArrowLeft' &&
          (appState.mode === 'Recording' || appState.mode === 'Completing')) {
        e.preventDefault();
        enterCorrectionMode();
        showContextMenuAtCursor();
        return;
      }

      // Backspace: enter Correction mode then immediately perform backspace-delete
      if (key === 'Backspace' &&
          (appState.mode === 'Recording' || appState.mode === 'Completing')) {
        e.preventDefault();
        enterCorrectionMode(true);
        performBackspaceDelete();
        return;
      }

      // Space: abort period break or toggle timer (only in Recording mode).
      // Works regardless of key buffer state; does not touch the buffer.
      if (key === ' ') {
        if (appState.breakTimerRunning) {
          endPeriodBreak();
          e.preventDefault();
        } else if (appState.mode === 'Recording') {
          toggleTimer();
          e.preventDefault();
        }
        return;
      }
      
      // Check if key is valid continuation
      if (!isValidContinuation(appState.keyBuffer, key)) {
        // Invalid key - ignore
        console.log('Invalid key for current buffer:', key);
        return;
      }
      
      // Add to buffer
      appState.keyBuffer.push(key);
      updateNextEventDisplay();
      console.log('Key buffer:', appState.keyBuffer);
      
      // Try to process sequence
      if (processKeySequence(appState.keyBuffer)) {
        // Sequence processed - clear buffer and suppress default key action so
        // the key character is not typed into any newly-focused input (e.g.
        // the time-modification modal input that may be opened by TT).
        appState.keyBuffer = [];
        updateNextEventDisplay();
        e.preventDefault();
        console.log('Sequence processed, buffer cleared');
      }
    });

    // ===================================================================
    // CORRECTION MODE
    // ===================================================================

    /** Returns the "main color" (R or B) of a bout event type. */
    function getEventMainColor(eventType) {
      const ptMatch = eventType.match(/^[1245](R|B)$/);
      if (ptMatch) return ptMatch[1];
      const psMatch = eventType.match(/^P(R|B)$/);
      if (psMatch) return psMatch[1];
      const actMatch = eventType.match(/^A(R|B)$/);
      if (actMatch) return actMatch[1];
      const cautMatch = eventType.match(/^0(R|B)[12](R|B)$/);
      if (cautMatch) return cautMatch[1]; // cautioned side
      return null;
    }

    /** Change the main color of a bout event type to newColor. */
    function modifyEventColor(eventType, newColor) {
      const oppColor = newColor === 'R' ? 'B' : 'R';
      const ptMatch = eventType.match(/^([1245])(R|B)$/);
      if (ptMatch) return ptMatch[1] + newColor;
      const psMatch = eventType.match(/^P(R|B)$/);
      if (psMatch) return 'P' + newColor;
      const actMatch = eventType.match(/^A(R|B)$/);
      if (actMatch) return 'A' + newColor;
      const cautMatch = eventType.match(/^0(R|B)([12])(R|B)$/);
      if (cautMatch) return `0${newColor}${cautMatch[2]}${oppColor}`;
      return eventType;
    }

    /** Change the point value of a bout event type; cautions become points. */
    function modifyEventPoints(eventType, newPoints) {
      const ptMatch = eventType.match(/^[1245](R|B)$/);
      if (ptMatch) return newPoints + ptMatch[1];
      const psMatch = eventType.match(/^P(R|B)$/);
      if (psMatch) return newPoints + psMatch[1];
      const cautMatch = eventType.match(/^0(R|B)([12])(R|B)$/);
      if (cautMatch) return newPoints + cautMatch[1]; // keep cautioned side color
      return eventType;
    }

    /** Change a bout event type to passivity, keeping the main color. */
    function modifyEventToPassivity(eventType) {
      const ptMatch = eventType.match(/^[1245](R|B)$/);
      if (ptMatch) return 'P' + ptMatch[1];
      if (eventType.match(/^P(R|B)$/)) return eventType;
      // Activity time event → passivity (AR→PR, AB→PB)
      const actMatch = eventType.match(/^A(R|B)$/);
      if (actMatch) return 'P' + actMatch[1];
      const cautMatch = eventType.match(/^0(R|B)([12])(R|B)$/);
      if (cautMatch) return 'P' + cautMatch[1];
      return eventType;
    }

    /** Change a bout event type to a caution with the given points, keeping the main color. */
    function modifyEventToCaution(eventType, cautionPoints) {
      const opp = c => c === 'R' ? 'B' : 'R';
      const ptMatch = eventType.match(/^[1245](R|B)$/);
      if (ptMatch) return `0${ptMatch[1]}${cautionPoints}${opp(ptMatch[1])}`;
      const psMatch = eventType.match(/^P(R|B)$/);
      if (psMatch) return `0${psMatch[1]}${cautionPoints}${opp(psMatch[1])}`;
      const cautMatch = eventType.match(/^0(R|B)([12])(R|B)$/);
      if (cautMatch) return `0${cautMatch[1]}${cautionPoints}${cautMatch[3]}`;
      return eventType;
    }

    /**
     * Enter Correction mode.
     * @param {boolean} startAfterEnd - When true, the cursor starts one position after the last
     *   event (used when entering via Backspace so the first performBackspaceDelete() lands on
     *   the last event). When false (default), cursor starts on the last event.
     */
    function enterCorrectionMode(startAfterEnd = false) {
      const cursorableEvents = getCursorableEvents();
      if (cursorableEvents.length === 0) return;
      appState.inCorrectionMode = true;
      appState.cursorIndex = startAfterEnd ? cursorableEvents.length : cursorableEvents.length - 1;
      appState.keyBuffer = [];
      updateTimeline();
      console.log('Entered correction mode, cursorIndex:', appState.cursorIndex);
    }

    /**
     * Exit Correction mode.
     * @param {boolean} confirm - true: write correction buffer to event log; false: discard
     */
    function exitCorrectionMode(confirm) {
      if (confirm && appState.correctionBuffer.length > 0) {
        // Collect seqs handled by timeModified so we skip redundant newEventType corrections
        const timeModifiedSeqs = new Set(
          appState.correctionBuffer.filter(c => c.timeModified).map(c => c.refSeq)
        );

        // Write all pending corrections to the event log
        appState.correctionBuffer.forEach(c => {
          if (c.deleted) {
            recordEvent({ eventType: 'EventDeleted', boutTime100ms: appState.boutTime100ms, refSeq: c.refSeq });
          } else if (c.newEventType && !timeModifiedSeqs.has(c.refSeq)) {
            recordEvent({ eventType: 'EventModified', boutTime100ms: appState.boutTime100ms, refSeq: c.refSeq, newEventType: c.newEventType });
          } else if (c.insertedEventType) {
            recordEvent({ eventType: 'EventInserted', boutTime100ms: c.boutTime100ms, refSeq: c.insertBefore, insertedEventType: c.insertedEventType });
          } else if (c.swapped) {
            recordEvent({ eventType: 'EventSwapped', boutTime100ms: appState.boutTime100ms, refSeq1: c.refSeq1, refSeq2: c.refSeq2 });
          } else if (c.timeModified) {
            // Delete the original event
            recordEvent({ eventType: 'EventDeleted', boutTime100ms: appState.boutTime100ms, refSeq: c.refSeq });
            // Insert a new event at the correct chronological position
            recordEvent({
              eventType: 'EventInserted',
              boutTime100ms: c.newBoutTime100ms,
              refSeq: c.insertBefore,
              insertedEventType: c.eventType
            });
          }
        });
      }
      appState.correctionBuffer = [];
      appState.inCorrectionMode = false;
      appState.inInsertMode = false;
      if (appState.inSwapMode) setEventButtonsFrozen(false);
      appState.inSwapMode = false;
      appState.swapOriginIndex = null;
      appState.cursorIndex = null;
      appState.timeModCorrectionEvent = null;
      appState.keyBuffer = [];
      hideContextMenu();
      updateTimeline();
      updateScores();
      updateNextEventDisplay();
      console.log('Exited correction mode, confirmed:', confirm);
    }

    /** Move the cursor left (-1) or right (+1) within cursorsable events. */
    function moveCursor(direction) {
      const cursorableEvents = getCursorableEvents();
      if (cursorableEvents.length === 0) return;
      const newIndex = (appState.cursorIndex ?? 0) + direction;
      if (newIndex < 0 || newIndex >= cursorableEvents.length) return; // clamp at bounds
      appState.cursorIndex = newIndex;
      appState.keyBuffer = [];
      updateTimeline();
      showContextMenuAtCursor();
    }

    /** Apply a modification to the currently cursored event in the correction buffer. */
    function modifyCurrentEvent(modification) {
      const cursorableEvents = getCursorableEvents();
      const event = cursorableEvents[appState.cursorIndex];
      if (!event) return;
      // Pending-inserted and time-modified virtual events cannot be modified via this path
      if (isVirtualEvent(event)) return;

      let newEventType;
      if (modification.type === 'color') {
        newEventType = modifyEventColor(event.eventType, modification.color);
      } else if (modification.type === 'points') {
        newEventType = modifyEventPoints(event.eventType, modification.points);
      } else if (modification.type === 'passivity') {
        newEventType = modifyEventToPassivity(event.eventType);
      } else if (modification.type === 'caution') {
        newEventType = modifyEventToCaution(event.eventType, modification.points);
      }

      if (!newEventType || newEventType === event.eventType) return; // no change

      // Replace any existing correction for this seq with the new one
      appState.correctionBuffer = appState.correctionBuffer.filter(c => c.refSeq !== event.seq);
      appState.correctionBuffer.push({ refSeq: event.seq, newEventType });

      updateTimeline();
      updateScores();
      console.log('Event modified in buffer:', event.seq, '->', newEventType);
    }

    /** Delete the currently cursored event (adds it to the correction buffer). */
    function deleteCurrentEvent() {
      const cursorableEvents = getCursorableEvents();
      const event = cursorableEvents[appState.cursorIndex];
      if (!event) return;

      // If cursor is on a pending-inserted event (seq starts with 'pi-'), cancel that pending insertion
      if (typeof event.seq === 'string' && event.seq.startsWith('pi-')) {
        const insertBeforeStr = event.seq.substring('pi-'.length);
        appState.correctionBuffer = appState.correctionBuffer.filter(
          c => !(c.insertedEventType && String(c.insertBefore) === insertBeforeStr)
        );
        // Clamp cursor after removing the pi- event
        const newCursorableEvents = getCursorableEvents();
        if (newCursorableEvents.length === 0) {
          appState.cursorIndex = null;
        } else if (appState.cursorIndex !== null && appState.cursorIndex >= newCursorableEvents.length) {
          appState.cursorIndex = newCursorableEvents.length - 1;
        }
        updateTimeline();
        updateScores();
        showContextMenuAtCursor();
        console.log('Cancelled pending insertion for:', insertBeforeStr);
        return;
      }

      // If cursor is on a time-modified virtual event (seq starts with 'tm-'), cancel that time modification
      if (typeof event.seq === 'string' && event.seq.startsWith('tm-')) {
        const origSeq = Number(event.seq.substring('tm-'.length));
        appState.correctionBuffer = appState.correctionBuffer.filter(
          c => !(c.timeModified && c.refSeq === origSeq)
        );
        // Move cursor back to the original event (now restored)
        const newCursorableEvents = getCursorableEvents();
        const origIdx = newCursorableEvents.findIndex(e => e.seq === origSeq);
        if (origIdx >= 0) {
          appState.cursorIndex = origIdx;
        } else if (newCursorableEvents.length === 0) {
          appState.cursorIndex = null;
        } else if (appState.cursorIndex !== null && appState.cursorIndex >= newCursorableEvents.length) {
          appState.cursorIndex = newCursorableEvents.length - 1;
        }
        updateTimeline();
        updateScores();
        showContextMenuAtCursor();
        console.log('Cancelled pending time modification for:', origSeq);
        return;
      }

      appState.correctionBuffer = appState.correctionBuffer.filter(c => c.refSeq !== event.seq);
      appState.correctionBuffer.push({ refSeq: event.seq, deleted: true });

      // Adjust cursor index; if no more cursorsable events remain, clear it (stay in correction mode)
      const newCursorableEvents = getCursorableEvents();
      if (newCursorableEvents.length === 0) {
        appState.cursorIndex = null;
      } else if (appState.cursorIndex >= newCursorableEvents.length) {
        appState.cursorIndex = newCursorableEvents.length - 1;
      }

      updateTimeline();
      updateScores();
      console.log('Event deleted in buffer:', event.seq);
    }

    /**
     * Backspace-style delete: move cursor one step to the left, then delete the event
     * now under the cursor.  The cursor is NOT adjusted after deletion (stays at its
     * current index so the next call moves left again).  No-op when the cursor is
     * already at the leftmost position (nothing to the left to delete).
     */
    function performBackspaceDelete() {
      const cursorBefore = appState.cursorIndex;
      moveCursor(-1);
      if (appState.cursorIndex === cursorBefore) return; // cursor didn't move – nothing to delete

      const cursorableEvents = getCursorableEvents();
      const event = cursorableEvents[appState.cursorIndex];
      if (!event) return;

      appState.correctionBuffer = appState.correctionBuffer.filter(c => c.refSeq !== event.seq);
      appState.correctionBuffer.push({ refSeq: event.seq, deleted: true });

      // Intentionally do NOT adjust cursorIndex here so successive Backspace presses
      // keep stepping left through the remaining events.

      updateTimeline();
      updateScores();
      console.log('Backspace-deleted event in buffer:', event.seq);
    }

    /**
     * Handle a keydown event while in Correction mode.
     * Prevents default for all keys to avoid browser navigation side effects.
     */
    function handleCorrectionModeKey(e) {
      const key = e.key;

      // Space: abort period break or toggle timer (same as Normal mode)
      if (key === ' ') {
        if (appState.breakTimerRunning) {
          endPeriodBreak();
        } else if (appState.mode === 'Recording') {
          toggleTimer();
        }
        e.preventDefault();
        return;
      }

      e.preventDefault();

      // ── Insert mode sub-handler ──────────────────────────────────────
      if (appState.inInsertMode) {
        handleInsertModeKey(key);
        return;
      }

      // ── Swap mode sub-handler ─────────────────────────────────────────
      if (appState.inSwapMode) {
        handleSwapModeKey(key);
        return;
      }

      if (key === 'ArrowLeft') { moveCursor(-1); return; }
      if (key === 'Backspace') { performBackspaceDelete(); return; }
      if (key === 'ArrowRight') { moveCursor(1); return; }

      if (key === 'Enter') {
        exitCorrectionMode(true);
        return;
      }

      if (key === 'Escape') {
        if (appState.keyBuffer.length === 0) {
          exitCorrectionMode(false);
        } else {
          appState.keyBuffer = [];
        }
        return;
      }

      if (key === 'Delete') {
        deleteCurrentEvent();
        return;
      }

      const upperKey = key.toUpperCase();

      // '#' → enter swap mode; '##' → enter insert mode (second '#' handled in swap mode)
      if (key === '#') {
        if (appState.cursorIndex !== null) {
          const cursorableEvts = getCursorableEvents();
          const cursorEvt = cursorableEvts[appState.cursorIndex];
          // Cannot enter swap mode from a virtual pending event (pi- or tm-)
          if (cursorEvt && isVirtualEvent(cursorEvt)) return;
          appState.inSwapMode = true;
          appState.swapOriginIndex = appState.cursorIndex;
          appState.keyBuffer = [];
          setEventButtonsFrozen(true);
          updateTimeline();
          showContextMenuAtCursor();
          console.log('Entered swap mode at index:', appState.cursorIndex);
        }
        return;
      }

      // Caution sequence: first '0', then '1' or '2'
      if (upperKey === '0' && appState.keyBuffer.length === 0) {
        appState.keyBuffer = ['0'];
        return;
      }
      if ((upperKey === '1' || upperKey === '2') && appState.keyBuffer.join('') === '0') {
        modifyCurrentEvent({ type: 'caution', points: upperKey });
        appState.keyBuffer = [];
        return;
      }

      // Any other key after '0' resets the buffer (invalid continuation)
      if (appState.keyBuffer.length > 0) {
        appState.keyBuffer = [];
        return;
      }

      // Single-key modification shortcuts
      if (upperKey === 'R') { modifyCurrentEvent({ type: 'color', color: 'R' }); return; }
      if (upperKey === 'B') { modifyCurrentEvent({ type: 'color', color: 'B' }); return; }
      if (['1', '2', '4', '5'].includes(upperKey)) { modifyCurrentEvent({ type: 'points', points: upperKey }); return; }
      if (upperKey === 'P') { modifyCurrentEvent({ type: 'passivity' }); return; }

      // T: open time-modification modal for the event at cursor position
      if (upperKey === 'T' && appState.cursorIndex !== null) {
        const cursorableEvents = getCursorableEvents();
        let event = cursorableEvents[appState.cursorIndex];
        if (event) {
          // If cursor is on a time-modified virtual event (tm- seq), normalize to the original
          // seq so the confirmation logic correctly updates the existing correction.
          if (typeof event.seq === 'string' && event.seq.startsWith('tm-')) {
            const origSeq = Number(event.seq.substring('tm-'.length));
            event = { seq: origSeq, boutTime100ms: event.boutTime100ms, eventType: event.eventType };
          }
          appState.timeModCorrectionEvent = event;
          openTimeModModal('correctionBoutTime');
        }
        return;
      }
    }

    /**
     * Handle a key press while in swap mode (after # in correction mode).
     * Left/Right selects the event to swap with; Enter confirms; Escape cancels.
     * '#' transitions to insert mode (enabling ## → insert mode sequence).
     */
    function handleSwapModeKey(key) {
      if (key === 'Escape') {
        // Cancel swap mode, return cursor to origin
        appState.cursorIndex = appState.swapOriginIndex;
        appState.swapOriginIndex = null;
        appState.inSwapMode = false;
        appState.keyBuffer = [];
        setEventButtonsFrozen(false);
        updateTimeline();
        updateScores();
        showContextMenuAtCursor();
        console.log('Swap mode cancelled');
        return;
      }

      if (key === 'Enter') {
        // Confirm swap if cursor moved from origin
        const cursorableEvents = getCursorableEvents();
        const originEvent = cursorableEvents[appState.swapOriginIndex];
        const targetEvent = cursorableEvents[appState.cursorIndex];
        if (originEvent && targetEvent && appState.cursorIndex !== appState.swapOriginIndex) {
          // Do not swap if either event is a virtual pending event (pi- or tm-)
          if (!isVirtualEvent(originEvent) && !isVirtualEvent(targetEvent)) {
            appState.correctionBuffer.push({ swapped: true, refSeq1: originEvent.seq, refSeq2: targetEvent.seq });
            updateScores();
          }
        }
        appState.swapOriginIndex = null;
        appState.inSwapMode = false;
        appState.keyBuffer = [];
        setEventButtonsFrozen(false);
        updateTimeline();
        showContextMenuAtCursor();
        console.log('Swap mode confirmed');
        return;
      }

      // '#' in swap mode → exit swap mode and enter insert mode (so ## → insert mode works)
      if (key === '#') {
        appState.swapOriginIndex = null;
        appState.inSwapMode = false;
        appState.inInsertMode = true;
        appState.keyBuffer = [];
        setEventButtonsFrozen(false);
        updateTimeline();
        showContextMenuAtCursor();
        console.log('Transition from swap mode to insert mode');
        return;
      }

      if (key === 'ArrowLeft' || key === 'Backspace') { moveCursor(-1); return; }
      if (key === 'ArrowRight') { moveCursor(1); return; }

      // Other keys in swap mode are ignored
    }

    /**
     * Handle a key press while in insert mode (after ## in correction mode).
     * Accepts bout event key sequences; on completion inserts a pending event.
     */
    function handleInsertModeKey(key) {
      if (key === 'Escape') {
        // Cancel insert mode, return to regular correction mode
        appState.inInsertMode = false;
        appState.keyBuffer = [];
        updateTimeline();
        showContextMenuAtCursor();
        console.log('Insert mode cancelled');
        return;
      }

      // Enter with empty buffer: also cancel insert mode
      if (key === 'Enter' && appState.keyBuffer.length === 0) {
        appState.inInsertMode = false;
        updateTimeline();
        showContextMenuAtCursor();
        return;
      }

      const upperKey = key.toUpperCase();

      // Validate as bout event key continuation
      if (!isValidContinuation(appState.keyBuffer, key)) {
        appState.keyBuffer = [];
        updateTimeline();
        return;
      }

      appState.keyBuffer.push(key);
      updateTimeline();

      // Try to resolve a complete bout event sequence
      const insertedEventType = resolveInsertEventType(appState.keyBuffer);
      if (insertedEventType) {
        // Determine the bout time: use the cursor event's bout time
        const cursorableEvents = getCursorableEvents();
        const cursorEvent = cursorableEvents[appState.cursorIndex];
        if (!cursorEvent) {
          appState.inInsertMode = false;
          appState.keyBuffer = [];
          updateTimeline();
          showContextMenuAtCursor();
          return;
        }
        // Cannot insert before a virtual pending event (pi- or tm-)
        if (isVirtualEvent(cursorEvent)) {
          appState.inInsertMode = false;
          appState.keyBuffer = [];
          updateTimeline();
          showContextMenuAtCursor();
          return;
        }
        appState.correctionBuffer.push({
          insertBefore: cursorEvent.seq,
          boutTime100ms: cursorEvent.boutTime100ms,
          insertedEventType
        });
        appState.inInsertMode = false;
        appState.keyBuffer = [];
        updateTimeline();
        updateScores();
        showContextMenuAtCursor();
        console.log('Event inserted in buffer:', insertedEventType, 'before seq', cursorEvent.seq);
      }
    }

    /**
     * Resolve a complete bout event type string from a key buffer, or return null
     * if the buffer does not yet form a complete bout event sequence.
     */
    function resolveInsertEventType(buffer) {
      const seq = buffer.map(k => k.toUpperCase()).join('');
      // Technical points: R1, 1R, R2, 2R, etc.
      if (seq.match(/^[RB][1245]$/)) return seq[1] + seq[0];
      if (seq.match(/^[1245][RB]$/)) return seq[0] + seq[1];
      // Passivity: RP, PR, BP, PB
      if (seq === 'RP' || seq === 'PR') return 'PR';
      if (seq === 'BP' || seq === 'PB') return 'PB';
      // Cautions: R01/0R1, R02/0R2, B01/0B1, B02/0B2
      const cautionMatch = seq.match(/^([RB])0([12])$/) || seq.match(/^0([RB])([12])$/);
      if (cautionMatch) {
        const s = cautionMatch[1], pts = cautionMatch[2], opp = s === 'R' ? 'B' : 'R';
        return `0${s}${pts}${opp}`;
      }
      return null;
    }


    // ===================================================================
    // EVENT BUTTON CLICK HANDLERS
    // ===================================================================
    
    /**
     * Simulates a key sequence by pushing keys to buffer and processing them.
     * @param {string[]} keys - Array of keys to simulate pressing in sequence
     */
    function simulateKeySequence(keys) {
      // Check if we're in a valid mode for recording events
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') {
        console.log('Cannot record events in mode:', appState.mode);
        return;
      }
      
      // Process each key in the sequence
      for (const key of keys) {
        // Check if key is valid continuation
        if (!isValidContinuation(appState.keyBuffer, key)) {
          console.log('Invalid key for current buffer:', key);
          appState.keyBuffer = [];
          return;
        }
        
        // Add to buffer
        appState.keyBuffer.push(key);
      }
      
      console.log('Button clicked, key buffer:', appState.keyBuffer);
      
      // Try to process sequence
      if (processKeySequence(appState.keyBuffer)) {
        // Sequence processed - clear buffer and reset next-event display
        appState.keyBuffer = [];
        updateNextEventDisplay();
        console.log('Sequence processed, buffer cleared');
      }
    }
    
    /**
     * Attach click handlers to all event buttons.
     * Buttons are labelled like [1R], [PR], [0R1B], [4B], etc.
     * Per UI spec, each click sends the colour key first, then the event key.
     */
    // ===================================================================
    // CONTEXT MENU
    // ===================================================================

    /**
     * Update the context menu to reflect insert mode state.
     * In insert mode: existing items are disabled, cancel item is shown.
     * Outside insert mode: existing items restored, cancel item hidden.
     */
    function updateContextMenuInsertMode(inInsertMode) {
      const inSubMode = inInsertMode || appState.inSwapMode;
      const cancelBtn = document.getElementById('ctx-insert-cancel');
      // ctx-delete, ctx-insert and ctx-swap are normally enabled; disable them in any sub-mode
      ['ctx-delete', 'ctx-insert', 'ctx-swap', 'ctx-time'].forEach(id => {
        const btn = document.getElementById(id);
        if (!btn) return;
        if (inSubMode) {
          btn.setAttribute('data-noop', '');
        } else {
          btn.removeAttribute('data-noop');
        }
      });
      if (cancelBtn) {
        cancelBtn.hidden = !inSubMode;
      }
    }

    /** Show the context menu positioned near (clientX, clientY). */
    function showContextMenu(clientX, clientY) {
      const PADDING = 4; // px gap between menu and viewport edge / trigger point
      const menu = document.getElementById('context-menu');
      menu.classList.add('open');
      // Measure after making it visible to get correct dimensions
      const menuRect = menu.getBoundingClientRect();
      // Prefer showing above the trigger point; clamp to viewport edges
      const top  = Math.max(PADDING, clientY - menuRect.height - PADDING);
      const left = Math.min(clientX, window.innerWidth - menuRect.width - PADDING);
      menu.style.top  = `${top}px`;
      menu.style.left = `${left}px`;
    }

    /** Hide the context menu. */
    function hideContextMenu() {
      document.getElementById('context-menu').classList.remove('open');
    }

    /**
     * Show the context menu positioned above the currently cursored timeline entry.
     * The lower-left corner of the menu is centered horizontally above the entry,
     * at a fixed vertical position (just above the timeline).
     * No-op if no cursor entry is found in the DOM.
     */
    function showContextMenuAtCursor() {
      const cursorEntry = timeline.querySelector('.entry-box.cursor')?.closest('.entry');
      if (!cursorEntry) return;
      const timelineRect = timeline.getBoundingClientRect();
      const menu = document.getElementById('context-menu');
      menu.classList.add('open');
      // Sync insert-mode state so cancel item and disabled items are correct
      updateContextMenuInsertMode(appState.inInsertMode);
      // When cursor is on a virtual pending event (pi- or tm-), disable insert and swap actions
      if (!appState.inInsertMode && !appState.inSwapMode && appState.cursorIndex !== null) {
        const cursorableEvts = getCursorableEvents();
        const cursorEvt = cursorableEvts[appState.cursorIndex];
        if (cursorEvt && isVirtualEvent(cursorEvt)) {
          document.getElementById('ctx-insert').setAttribute('data-noop', '');
          document.getElementById('ctx-swap').setAttribute('data-noop', '');
        }
      }
      // Measure after applying insert-mode state to get correct menu height
      // (showing/hiding the cancel button changes the menu's height)
      const entryRect = cursorEntry.getBoundingClientRect();
      const menuRect = menu.getBoundingClientRect();
      // Lower-left corner centered above the cursored event, fixed vertical above timeline
      const PADDING = 4;
      const left = Math.max(PADDING, Math.min(
        entryRect.left + entryRect.width / 2,
        window.innerWidth - menuRect.width - PADDING
      ));
      const top = Math.max(PADDING, timelineRect.top - menuRect.height - PADDING);
      menu.style.top  = `${top}px`;
      menu.style.left = `${left}px`;
    }

    /** Set up context menu item handlers and outside-click dismissal. */
    function initializeContextMenu() {
      document.getElementById('ctx-delete').addEventListener('click', () => {
        deleteCurrentEvent();
        showContextMenuAtCursor();
      });

      // ctx-insert: enter event insert mode
      document.getElementById('ctx-insert').addEventListener('click', () => {
        if (appState.inInsertMode) return; // already in insert mode
        const cursorableEvts = getCursorableEvents();
        const cursorEvt = appState.cursorIndex !== null ? cursorableEvts[appState.cursorIndex] : null;
        // Cannot enter insert mode from a virtual pending event (pi- or tm-)
        if (cursorEvt && isVirtualEvent(cursorEvt)) return;
        appState.inInsertMode = true;
        appState.keyBuffer = [];
        updateTimeline();
        showContextMenuAtCursor();
      });

      // ctx-insert-cancel: cancel event insert mode or swap mode
      document.getElementById('ctx-insert-cancel').addEventListener('click', () => {
        if (appState.inSwapMode) {
          appState.cursorIndex = appState.swapOriginIndex;
          appState.swapOriginIndex = null;
          appState.inSwapMode = false;
          setEventButtonsFrozen(false);
        } else {
          appState.inInsertMode = false;
        }
        appState.keyBuffer = [];
        updateTimeline();
        showContextMenuAtCursor();
      });

      // ctx-swap: enter event swap mode
      // Guard against inSwapMode is intentional: data-noop only disables visually (no pointer-events:none),
      // so a click could still fire while in swap mode. The state guard ensures idempotency.
      document.getElementById('ctx-swap').addEventListener('click', () => {
        if (appState.inSwapMode || appState.cursorIndex === null) return;
        const cursorableEvts = getCursorableEvents();
        const cursorEvt = cursorableEvts[appState.cursorIndex];
        // Cannot enter swap mode from a virtual pending event (pi- or tm-)
        if (cursorEvt && isVirtualEvent(cursorEvt)) return;
        appState.inSwapMode = true;
        appState.swapOriginIndex = appState.cursorIndex;
        appState.keyBuffer = [];
        setEventButtonsFrozen(true);
        updateTimeline();
        showContextMenuAtCursor();
      });

      // ctx-time: open time-modification modal for the event at cursor position (same as T key)
      document.getElementById('ctx-time').addEventListener('click', () => {
        if (appState.cursorIndex === null) return;
        const cursorableEvents = getCursorableEvents();
        let event = cursorableEvents[appState.cursorIndex];
        if (event) {
          // If cursor is on a time-modified virtual event (tm- seq), normalize to the original
          // seq so the confirmation logic correctly updates the existing correction.
          if (typeof event.seq === 'string' && event.seq.startsWith('tm-')) {
            const origSeq = Number(event.seq.substring('tm-'.length));
            event = { seq: origSeq, boutTime100ms: event.boutTime100ms, eventType: event.eventType };
          }
          appState.timeModCorrectionEvent = event;
          openTimeModModal('correctionBoutTime');
        }
      });
    }

    // ===================================================================
    // TIMELINE CLICK / CONTEXTMENU INTERACTION
    // ===================================================================

    /**
     * Enter correction mode with cursor placed at the cursorable event
     * identified by seq. If already in correction mode, just moves the cursor.
     * No-op if seq is not found among cursorable events or mode is not active.
     */
    function enterCorrectionModeAtSeq(seq) {
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return;
      const cursorableEvents = getCursorableEvents();
      const idx = cursorableEvents.findIndex(e => String(e.seq) === String(seq));
      if (idx === -1) return;
      if (!appState.inCorrectionMode) {
        appState.inCorrectionMode = true;
        appState.keyBuffer = [];
      }
      appState.cursorIndex = idx;
      updateTimeline();
      console.log('Cursor set via click, cursorIndex:', idx);
    }

    /** Set up click and contextmenu event delegation on the timeline element. */
    function initializeTimelineInteraction() {
      // Right-click: enter correction mode and show context menu
      timeline.addEventListener('contextmenu', (e) => {
        const entryBox = e.target.closest('.entry-box');
        if (!entryBox) return;
        const entry = entryBox.closest('.entry[data-seq]');
        if (!entry) return;
        e.preventDefault();
        enterCorrectionModeAtSeq(entry.dataset.seq);
        showContextMenuAtCursor();
      });

      // Left-click in swap mode: click a target entry to confirm the swap
      timeline.addEventListener('click', (e) => {
        if (!appState.inSwapMode) return;
        const entryBox = e.target.closest('.entry-box');
        if (!entryBox) return;
        const entry = entryBox.closest('.entry[data-seq]');
        if (!entry) return;
        const cursorableEvents = getCursorableEvents();
        const clickedIdx = cursorableEvents.findIndex(ev => String(ev.seq) === String(entry.dataset.seq));
        if (clickedIdx === -1) return;
        // Perform swap if a different entry was clicked.
        // Null checks are defensive: swapOriginIndex could be out-of-bounds if events changed.
        const originEvent = cursorableEvents[appState.swapOriginIndex];
        const targetEvent = cursorableEvents[clickedIdx];
        if (originEvent && targetEvent && clickedIdx !== appState.swapOriginIndex) {
          // Do not swap if either event is a virtual pending event (pi- or tm-)
          if (!isVirtualEvent(originEvent) && !isVirtualEvent(targetEvent)) {
            appState.correctionBuffer.push({ swapped: true, refSeq1: originEvent.seq, refSeq2: targetEvent.seq });
            updateScores();
          }
        }
        appState.cursorIndex = clickedIdx;
        appState.swapOriginIndex = null;
        appState.inSwapMode = false;
        appState.keyBuffer = [];
        setEventButtonsFrozen(false);
        updateTimeline();
        showContextMenuAtCursor();
      });
    }

    /**
     * Apply a target event type directly to the currently cursored event.
     * Used when an event button is clicked while in correction mode.
     */
    function applyButtonEventType(targetType) {
      if (appState.cursorIndex === null) return;
      const cursorableEvents = getCursorableEvents();
      const event = cursorableEvents[appState.cursorIndex];
      if (!event) return;
      // Pending-inserted and time-modified virtual events cannot be modified via this path
      if (isVirtualEvent(event)) return;
      if (targetType === event.eventType) return; // no change
      appState.correctionBuffer = appState.correctionBuffer.filter(c => c.refSeq !== event.seq);
      appState.correctionBuffer.push({ refSeq: event.seq, newEventType: targetType });
      updateTimeline();
      updateScores();
      console.log('Event modified via button click:', event.seq, '->', targetType);
    }

    /**
     * Insert a new event of the given type before the cursored event.
     * Used when an event button is clicked while in insert mode.
     * Exits insert mode after the insertion.
     */
    function applyButtonEventTypeAsInsert(insertedEventType) {
      if (appState.cursorIndex === null) return;
      const cursorableEvents = getCursorableEvents();
      const cursorEvent = cursorableEvents[appState.cursorIndex];
      if (!cursorEvent) {
        appState.inInsertMode = false;
        appState.keyBuffer = [];
        updateTimeline();
        showContextMenuAtCursor();
        return;
      }
      // Cannot insert before a virtual pending event (pi- or tm-)
      if (isVirtualEvent(cursorEvent)) {
        appState.inInsertMode = false;
        appState.keyBuffer = [];
        updateTimeline();
        showContextMenuAtCursor();
        return;
      }
      appState.correctionBuffer.push({
        insertBefore: cursorEvent.seq,
        boutTime100ms: cursorEvent.boutTime100ms,
        insertedEventType
      });
      appState.inInsertMode = false;
      appState.keyBuffer = [];
      updateTimeline();
      updateScores();
      showContextMenuAtCursor();
      console.log('Event inserted via button in insert mode:', insertedEventType, 'before seq', cursorEvent.seq);
    }

    function initializeEventButtons() {
      // Shared setup for both colour sides.
      ['R', 'B'].forEach(color => {
        const opponent   = color === 'R' ? 'B' : 'R';
        const containerId = color === 'R' ? 'event-buttons-red' : 'event-buttons-blue';

        document.querySelectorAll(`#${containerId} .event-btn`).forEach(btn => {
          const label = btn.textContent.trim();
          let keys;

          // Caution button: [0R1B], [0R2B], [0B1R], [0B2R]
          const cautionMatch = label.match(new RegExp(`\\[0${color}([12])${opponent}\\]`));
          if (cautionMatch) {
            keys = [color, '0', cautionMatch[1]];
          } else {
            // Regular point / passivity button: [1R], [PR], [4B] …
            const regularMatch = label.match(new RegExp(`\\[([0-9P]+)${color}\\]`));
            if (regularMatch) keys = [color, regularMatch[1]];
          }

          if (keys) {
            // The event type is the button label with brackets stripped.
            // All event buttons follow the [TYPE] format (e.g. [1R], [PR], [0R1B]).
            const eventType = label.slice(1, -1); // e.g. "[1R]" → "1R", "[0R1B]" → "0R1B"
            btn.addEventListener('click', () => {
              if (appState.inCorrectionMode && appState.inInsertMode) {
                applyButtonEventTypeAsInsert(eventType);
              } else if (appState.inCorrectionMode && !appState.inInsertMode && !appState.inSwapMode) {
                applyButtonEventType(eventType);
              } else {
                simulateKeySequence(keys);
              }
              btn.blur();
            });
            // Prevent Space from re-triggering the button after a click.
            btn.addEventListener('keydown', e => {
              if (e.code === 'Space' || e.key === ' ') e.preventDefault();
            });
          }
        });
      });
    }

    // --- Ruleset helper -------------------------------------------------
    function loadEmbeddedRuleset() {
      const el = document.getElementById('default-ruleset');
      if (!el) return null;
      try {
        return JSON.parse(el.textContent);
      } catch (e) {
        console.error('Failed to parse embedded ruleset:', e);
        return null;
      }
    }

    function simpleValidateRuleset(r) {
      const errors = [];
      if (!r) { errors.push('ruleset missing'); return { valid: false, errors }; }
      if (!r.metadata || typeof r.metadata.name !== 'string') errors.push('metadata.name required');
      if (!Array.isArray(r.periodTimesInSeconds)) errors.push('periodTimesInSeconds array required');
      if (typeof r.periodTimeCountingDirection !== 'string') errors.push('periodTimeCountingDirection required');
      if (typeof r.periodBreakTimeInSeconds !== 'number') errors.push('periodBreakTimeInSeconds required');
      if (!Array.isArray(r.victoryTypes)) errors.push('victoryTypes array required');
      if (Array.isArray(r.victoryTypes)) {
        const typesSeen = new Set();
        r.victoryTypes.forEach((vt, i) => {
          if (typeof vt.type !== 'string') {
            errors.push(`victoryTypes[${i}].type required`);
          } else {
            if (typesSeen.has(vt.type)) errors.push(`victoryTypes[${i}].type "${vt.type}" is not unique`);
            typesSeen.add(vt.type);
          }
          const cp = vt.classificationPoints;
          if (!cp || typeof cp !== 'object' || Array.isArray(cp)) {
            errors.push(`victoryTypes[${i}].classificationPoints must be an object {winner, loser}`);
          } else {
            if (cp.winner === undefined) errors.push(`victoryTypes[${i}].classificationPoints.winner required`);
            if (cp.loser === undefined) errors.push(`victoryTypes[${i}].classificationPoints.loser required`);
          }
          if (vt.condition && typeof vt.condition === 'object') {
            Object.values(vt.condition).forEach(op => {
              if (typeof op !== 'object') errors.push(`victoryTypes[${i}].condition entries must be objects`);
            });
          }
        });
      }
      return { valid: errors.length === 0, errors };
    }

    function evalOperator(value, op, target) {
      if (op.gte !== undefined && !(value >= op.gte)) return false;
      if (op.lte !== undefined && !(value <= op.lte)) return false;
      if (op.gt !== undefined && !(value > op.gt)) return false;
      if (op.lt !== undefined && !(value < op.lt)) return false;
      if (op.eq !== undefined && !(value === op.eq)) return false;
      return true;
    }

    function evaluateCondition(condition, context) {
      if (!condition) return true;
      // All named condition fields must be satisfied (AND)
      for (const key in condition) {
        const op = condition[key];
        const value = context[key];
        if (value === undefined) return false;
        if (!evalOperator(value, op, key)) return false;
      }
      return true;
    }

    function findMatchingVictoryTypes(ruleset, context) {
      if (!ruleset || !Array.isArray(ruleset.victoryTypes)) return [];
      return ruleset.victoryTypes.filter(vt => {
        if (!vt.condition) return true;
        return evaluateCondition(vt.condition, context);
      });
    }

    function resolveClassificationPoints(classificationPoints, context) {
      function resolveValue(v) {
        if (typeof v === 'number') return v;
        if (Array.isArray(v)) {
          for (const entry of v) {
            const [points, opts] = entry;
            if (evaluateCondition(opts.when, context)) return points;
          }
          return 0;
        }
        return 0;
      }
      return {
        winner: resolveValue(classificationPoints.winner),
        loser: resolveValue(classificationPoints.loser)
      };
    }

    function getLastAwardSide(events) {
      for (let i = events.length - 1; i >= 0; i--) {
        const e = events[i];
        const pointMatch = e.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) return pointMatch[2] === 'R' ? 'red' : 'blue';
        const cautionMatch = e.eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) return cautionMatch[3] === 'R' ? 'red' : 'blue';
      }
      return null;
    }

    function findTiebreakWinner(events) {
      const stats = calculateStatistics(events);
      const diff5 = stats.red.technicalPoints["5"] - stats.blue.technicalPoints["5"];
      if (diff5 !== 0) return diff5 > 0 ? 'red' : 'blue';
      const diff4 = stats.red.technicalPoints["4"] - stats.blue.technicalPoints["4"];
      if (diff4 !== 0) return diff4 > 0 ? 'red' : 'blue';
      const diff2 = stats.red.technicalPoints["2"] - stats.blue.technicalPoints["2"];
      if (diff2 !== 0) return diff2 > 0 ? 'red' : 'blue';
      return getLastAwardSide(events);
    }

    function getBoutContext(winnerSide) {
      const effectiveEvents = getEffectiveBoutEvents();
      const scores = calculateScores(effectiveEvents);
      const stats = calculateStatistics(effectiveEvents);
      const context = {
        scoreDifference: Math.abs(scores.red - scores.blue),
        scoreRed: scores.red,
        scoreBlue: scores.blue,
        cautionCount: stats.red.cautions + stats.blue.cautions,
        passivityCount: stats.red.passivity + stats.blue.passivity
      };
      if (winnerSide === 'red' || winnerSide === 'blue') {
        const loserSide = winnerSide === 'red' ? 'blue' : 'red';
        context.award5Difference = stats[winnerSide].technicalPoints["5"] - stats[loserSide].technicalPoints["5"];
        context.award4Difference = stats[winnerSide].technicalPoints["4"] - stats[loserSide].technicalPoints["4"];
        context.award2Difference = stats[winnerSide].technicalPoints["2"] - stats[loserSide].technicalPoints["2"];
        context.lastAward = getLastAwardSide(effectiveEvents) === winnerSide ? 1 : 0;
      }
      return context;
    }

    // Expose helper
    window.rulesetHelper = {
      load: loadEmbeddedRuleset,
      validate: simpleValidateRuleset,
      evaluateCondition,
      findMatchingVictoryTypes,
      resolveClassificationPoints,
      getBoutContext,
      getLastAwardSide,
      findTiebreakWinner
    };

    // Auto-load and validate at startup (logs result)
    const _embeddedRuleset = loadEmbeddedRuleset();
    const _valid = simpleValidateRuleset(_embeddedRuleset);
    if (!_valid.valid) console.warn('Embedded ruleset validation warnings:', _valid.errors);

    // --- Export functionality --------------------------------------------
    function getSystemMetadata() {
      return {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: Array.from(navigator.languages || [navigator.language]),
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight
        },
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset: new Date().getTimezoneOffset()
      };
    }

    function parseInfo(infoString) {
      // Parse key-value pairs from info string (spec: key:value; separator)
      const pairs = {};
      const segments = infoString.split(';').map(s => s.trim());
      let anonCounter = 1;
      
      segments.forEach(seg => {
        if (!seg) return;
        const colonIdx = seg.indexOf(':');
        if (colonIdx === -1) {
          pairs[`$anonym${anonCounter++}`] = seg;
        } else {
          let key = seg.substring(0, colonIdx).trim();
          const value = seg.substring(colonIdx + 1).trim();
          
          if (key.startsWith('$$')) {
            // Hidden pair - don't include in parsedInfo
            return;
          }
          if (key.startsWith('$')) {
            pairs[`anonym${anonCounter++}`] = value;
          } else {
            pairs[key.toLowerCase()] = value;
          }
        }
      });
      return pairs;
    }

    function calculateStatistics(events) {
      const stats = {
        red: {
          technicalPoints: { "1": 0, "2": 0, "4": 0, "5": 0 },
          passivity: 0,
          cautions: 0,
          injuryTime100ms: 0,
          bloodTime100ms: 0
        },
        blue: {
          technicalPoints: { "1": 0, "2": 0, "4": 0, "5": 0 },
          passivity: 0,
          cautions: 0,
          injuryTime100ms: 0,
          bloodTime100ms: 0
        },
        totalEvents: events.length,
        corrections: 0
      };

      events.forEach(e => {
        // Technical points
        const pointMatch = e.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) {
          const points = pointMatch[1];
          const side = pointMatch[2] === 'R' ? 'red' : 'blue';
          stats[side].technicalPoints[points]++;
        }
        
        // Passivity — AR/AB (activity time) count as passivity for the respective side
        if (e.eventType === 'PR' || e.eventType === 'AR') stats.red.passivity++;
        if (e.eventType === 'PB' || e.eventType === 'AB') stats.blue.passivity++;
        
        // Cautions
        if (e.eventType.match(/^0R[12]B$/)) stats.red.cautions++;
        if (e.eventType.match(/^0B[12]R$/)) stats.blue.cautions++;
        
        // Corrections
        if (e.eventType.startsWith('Event') || e.eventType.includes('_Modified')) {
          stats.corrections++;
        }
      });

      // Injury/blood time: read elapsed time from the live injury timer state
      stats.red.injuryTime100ms  = appState.injuryTimers.IR.time100ms;
      stats.blue.injuryTime100ms = appState.injuryTimers.IB.time100ms;
      stats.red.bloodTime100ms   = appState.injuryTimers.BR.time100ms;
      stats.blue.bloodTime100ms  = appState.injuryTimers.BB.time100ms;

      return stats;
    }

    function generateExport() {
      const ruleset = loadEmbeddedRuleset();
      const boutInfo = document.getElementById('bout-info')?.value || '';
      const style = document.getElementById('style-select')?.value || 'Freestyle';
      const rulesetName = document.getElementById('ruleset-select')?.value || 'Default Ruleset';
      const redInfo = document.getElementById('info-red')?.textContent || 'Rot';
      const blueInfo = document.getElementById('info-blue')?.textContent || 'Blau';
      
      // Use effective events so that all committed corrections (EventModified,
      // EventDeleted, EventInserted, EventSwapped) are reflected in scores,
      // statistics, and the timeline — matching what the browser displays.
      const effectiveEvents = getEffectiveBoutEvents();
      const scores = calculateScores(effectiveEvents);
      const statistics = calculateStatistics(effectiveEvents);
      // Count correction records from the raw event log:
      // - startsWith('Event'): EventModified, EventDeleted, EventInserted, EventSwapped
      // - includes('_Modified'): T_Modified, T_IR_Modified, etc. (timer adjustments)
      // These two sets are disjoint so there is no double-counting.
      statistics.corrections = appState.events.filter(e =>
        e.eventType.startsWith('Event') || e.eventType.includes('_Modified')
      ).length;
      
      // Calculate winner
      let winner = 'none';
      if (appState.completed) {
        if (appState.winner && appState.winner !== 'none') {
          winner = appState.winner;
        } else if (scores.red > scores.blue) {
          winner = 'red';
        } else if (scores.blue > scores.red) {
          winner = 'blue';
        } else {
          winner = 'draw';
        }
      }
      
      // Calculate total bout time (sum of running periods)
      let totalBoutTime100ms = 0;
      let timerStartTime = 0;
      appState.events.forEach(e => {
        if (e.eventType === 'T_Started') {
          timerStartTime = e.boutTime100ms;
        } else if (e.eventType === 'T_Stopped' && timerStartTime !== null) {
          totalBoutTime100ms += (e.boutTime100ms - timerStartTime);
          timerStartTime = null;
        }
      });
      
      // Calculate real time duration
      let totalRealTime = 0;
      if (appState.createdAt && appState.completedAt) {
        totalRealTime = new Date(appState.completedAt) - new Date(appState.createdAt);
      }
      
      // Build timeline from effective events (corrections already applied);
      // exclude virtual pending events that only exist during an active correction session.
      const timeline = effectiveEvents
        .filter(e => !isVirtualEvent(e))
        .map(e => ({
          seq: e.seq,
          eventType: e.eventType,
          boutTime100ms: e.boutTime100ms
        }));

      const exportData = {
        "$schema": "./export-v1.schema.json",
        "exportVersion": "1.0",
        "metadata": {
          "app": {
            "name": "CHAMP Protocol",
            "version": "1.0.0",
            "build": "2025-01-15T10:30:00Z"
          },
          "system": getSystemMetadata()
        },
        "bout": {
          "header": {
            "createdAt": appState.createdAt || new Date().toISOString(),
            "info": boutInfo,
            "style": style,
            "ruleset": {
              "reference": ruleset?.metadata?.name || rulesetName,
              "embedded": ruleset
            },
            "wrestlers": {
              "red": {
                "info": redInfo,
                "parsedInfo": parseInfo(redInfo)
              },
              "blue": {
                "info": blueInfo,
                "parsedInfo": parseInfo(blueInfo)
              }
            }
          },
          "summary": {
            "completed": appState.completed,
            "completedAt": appState.completedAt,
            "duration": {
              "totalBoutTime100ms": totalBoutTime100ms,
              "totalRealTime": totalRealTime,
              "periods": []
            },
            "scores": scores,
            "winner": winner,
            "victory": appState.victoryType ? {
              "type": appState.victoryType,
              "description": appState.victoryDescription || "",
              "classificationPoints": appState.classificationPoints || [0, 0]
            } : undefined,
            "statistics": statistics,
            "timeline": timeline,
            "notes": ""
          },
          "events": appState.events
        }
      };

      return exportData;
    }

    function downloadExport() {
      const exportData = generateExport();
      const jsonString = JSON.stringify(exportData, null, 2);
      const blob = new Blob([jsonString], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
      const filename = `champ-export-${timestamp}.json`;
      
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      console.log('Export downloaded:', filename);
    }

    // Expose export helper
    window.exportHelper = {
      generate: generateExport,
      download: downloadExport
    };

    window.testHelper = {
      injectEvent: (evt) => { appState.events.push(evt); updateTimeline(); },
      getState: () => ({
        mode: appState.mode,
        inCorrectionMode: appState.inCorrectionMode,
        inInsertMode: appState.inInsertMode,
        inSwapMode: appState.inSwapMode,
        cursorIndex: appState.cursorIndex,
        correctionBuffer: appState.correctionBuffer.slice(),
        breakTimerRunning: appState.breakTimerRunning,
        breakTime100ms: appState.breakTime100ms,
        currentPeriodIndex: appState.currentPeriodIndex,
        periodTime100ms: appState.periodTime100ms,
        boutTime100ms: appState.boutTime100ms,
        timerRunning: appState.timerRunning,
        injuryTimers: {
          IR: { running: appState.injuryTimers.IR.running, time100ms: appState.injuryTimers.IR.time100ms },
          IB: { running: appState.injuryTimers.IB.running, time100ms: appState.injuryTimers.IB.time100ms },
          BR: { running: appState.injuryTimers.BR.running, time100ms: appState.injuryTimers.BR.time100ms },
          BB: { running: appState.injuryTimers.BB.running, time100ms: appState.injuryTimers.BB.time100ms }
        },
        activityTimers: {
          AR: { active: appState.activityTimers.AR.active, time100ms: appState.activityTimers.AR.time100ms, seq: appState.activityTimers.AR.seq },
          AB: { active: appState.activityTimers.AB.active, time100ms: appState.activityTimers.AB.time100ms, seq: appState.activityTimers.AB.seq }
        }
      }),
      setPeriodTime100ms: (value) => { appState.periodTime100ms = value; updateBoutTimeDisplay(); },
      setBoutTime100ms: (value) => { appState.boutTime100ms = value; },
      setInjuryTime100ms: (key, value) => {
        appState.injuryTimers[key].time100ms = value;
        updateInjuryTimerDisplay(key);
      },
      setActivityTime100ms: (key, value) => {
        appState.activityTimers[key].time100ms = value;
        updateActivityTimerDisplay(key);
      },
      triggerPeriodBreak: (breakSeconds) => {
        recordEvent({ eventType: 'PeriodEnd', boutTime100ms: appState.boutTime100ms });
        const ruleset = loadEmbeddedRuleset();
        appState.currentPeriodIndex++;
        const seconds = breakSeconds !== undefined ? breakSeconds : ruleset.periodBreakTimeInSeconds;
        startPeriodBreak(seconds);
      }
    };

    // ===================================================================
    // INITIALIZATION
    // ===================================================================
    function initializeApp() {
      // Populate victory types once at startup
      populateVictoryTypes();

      // Clear timeline
      timeline.innerHTML = '';
      
      // Initialize scores
      updateScores();
      
      // Initialize event button click handlers
      initializeEventButtons();

      // Initialize timeline click/contextmenu interaction
      initializeTimelineInteraction();

      // Initialize context menu
      initializeContextMenu();

      // Initialize correction confirm/cancel buttons
      document.getElementById('corr-confirm').addEventListener('click', () => {
        if (appState.inCorrectionMode) {
          exitCorrectionMode(true);
        }
      });
      document.getElementById('corr-cancel').addEventListener('click', () => {
        if (appState.inCorrectionMode) {
          exitCorrectionMode(false);
        }
      });

      // Injury/blood timer button click handlers
      [['injury-time-red', 'IR'], ['blood-time-red', 'BR'],
       ['injury-time-blue', 'IB'], ['blood-time-blue', 'BB']].forEach(([id, key]) => {
        const btn = document.getElementById(id);
        if (btn) {
          btn.addEventListener('click', () => {
            if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return;
            toggleInjuryTimer(key);
          });
          btn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            openTimeModModal(key);
          });
          attachLongPress(btn, () => openTimeModModal(key));
        }
      });

      // Reset completion form explicitly (browser may restore values after reload)
      const complForm = document.getElementById('completion-form');
      complForm.classList.remove('winner-red', 'winner-blue');
      document.getElementById('compl-winner').value = '-';
      document.getElementById('compl-victory-type').value = '-';
      document.getElementById('compl-points-red').value = '0';
      document.getElementById('compl-points-blue').value = '0';
      
      // Apply initial state
      applyState('New');

      // Initialize injury timer displays
      ['IR', 'IB', 'BR', 'BB'].forEach(key => updateInjuryTimerDisplay(key));
      
      console.log('App initialized in New state');
    }

    // Initialize on page load
    initializeApp();
  </script>
</body>
