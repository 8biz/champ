<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHAMP Protocol – Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --red: #d33131;
      --blue: #1975d2;
      --break: #00A550;
      --neutral-1: #f5f5f5;
      --neutral-2: #9e9e9e;
      --neutral-3: #616161;
      --border: #c9c9c9;
      --text: #1f1f1f;
    }

    html,
    body {
      margin: 0;
      min-width: 20rem;
      min-height: 20rem;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: var(--neutral-1);
    }

    html {
      font-size: clamp(0.875em, 1.5vw, 1em);
    }

    body {
      padding: 0.5rem;
    }

    .app {
      height: calc(100vh - 1rem);
      min-height: 19rem;
      border: 0.0625rem solid var(--border);
      background: #fff;
      border-radius: 0.5rem;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 0.5rem;
      padding: 0.5rem;
      overflow: hidden;
    }

    .top-bar {
      display: grid;
      grid-template-columns: minmax(7.5rem, 1fr) auto auto auto;
      gap: 0.5rem;
      align-items: center;
    }

    .field,
    .select,
    .action {
      min-height: 2.25rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0 0.6rem;
    }

    .action {
      font-weight: 600;
      cursor: pointer;
    }

    /* Mirror the pencil glyph for the blue side's header action button */
    .side.blue .side-head .action {
      display: inline-block;
      transform: scaleX(-1);
      line-height: 1;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      min-height: 0;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr minmax(8.125rem, 11.25rem) 1fr;
      gap: 0.5rem;
      min-height: 0;
    }

    /* Shared base for wrestler panels (board) and button columns */
    .side, .button-side {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      display: grid;
      gap: 0.45rem;
      min-height: 0;
    }

    /* Board panels have an extra row for injury display */
    .side        { grid-template-rows: auto auto auto 1fr; }
    .button-side { grid-template-rows: auto 1fr; }

    /* Tinted background for colour-coded columns */
    .side.red, .button-side.red   { background: color-mix(in srgb, var(--red)  8%, white); }
    .side.blue, .button-side.blue { background: color-mix(in srgb, var(--blue) 8%, white); }

    .side-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }

    .score {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      font-weight: 700;
      text-align: center;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0.2rem 0;
    }

    .injury-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .mini-time {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      padding: 0.35rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .event-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem;
      align-content: start;
    }

    .event-btn {
      border: 0.0625rem solid transparent;
      border-radius: 0.375rem;
      min-height: 3rem;
      font-weight: 700;
      cursor: default;
      color: #fff;
    }

    .red .event-btn {
      background: var(--red);
      border-color: var(--red);
    }

    .blue .event-btn {
      background: var(--blue);
      border-color: var(--blue);
    }

    .event-btn:disabled {
      opacity: 0.5;
      background: var(--neutral-2) !important;
      border-color: var(--neutral-2) !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .bout-time:disabled {
      opacity: 0.5;
      background: var(--neutral-1) !important;
      border-color: var(--neutral-2) !important;
      cursor: not-allowed;
      pointer-events: none;
    }

    .bout-time.break-mode {
      background: var(--break);
      border-color: var(--break);
      color: #fff;
    }

    .bout-time.break-mode .time-label,
    .bout-time.break-mode .time-note {
      color: #fff;
    }

    .center {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 0.5rem;
      align-content: start;
    }

    .mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.35rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      padding: 0.25rem 0.35rem;
    }

    .mode-chip {
      border-radius: 999rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 0.16rem 0.45rem;
      border: 0.0625rem solid var(--neutral-3);
      color: var(--neutral-3);
      background: #fff;
    }

    .mode-chip.active {
      background: var(--neutral-3);
      color: #fff;
    }

    .mode-hint {
      color: var(--neutral-3);
      font-weight: 600;
    }

    .time-label {
      text-align: center;
      color: var(--neutral-3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bout-time {
      border: 0.125rem solid var(--neutral-3);
      border-radius: 0.625rem;
      background: #fff;
      padding: 0.6rem 0.3rem;
      cursor: pointer;
      text-align: center;
    }

    .time {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      line-height: 1;
      display: inline-block;
      /* reserve space for visual superscript added via ::after */
    }

    /* Visual-only superscript for the 100ms digit. Uses a data attribute so
       the textual content (used by tests/assistive tech) remains M:SS. */
    .time::after {
      content: attr(data-fraction);
      font-size: 0.45em;
      vertical-align: super;
      margin-left: 0.08em;
      line-height: 1;
      color: inherit;
      display: inline-block;
    }

    .time-note {
      margin-top: 0.2rem;
      color: var(--neutral-3);
    }

    .timeline {
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.4rem;
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      align-items: flex-start;
    }

    .entry {
      min-width: 3.125rem;
      display: grid;
      gap: 0.15rem;
      justify-items: center;
    }

    .entry-box {
      width: 3.125rem;
      height: 2.5rem;
      border-radius: 0.25rem;
      border: 0.125rem solid;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #fff;
    }

    .entry-box.caution {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0;
      overflow: hidden;
      background: #fff;
    }

    .entry-box.caution.blue {
      border-color: var(--blue);
    }

    .entry-box.caution.red {
      border-color: var(--red);
    }

    .caution-row {
      width: 100%;
      display: grid;
      place-items: center;
      font-weight: 700;
      line-height: 1;
      color: #fff;
    }

    .caution-row.blue {
      background: var(--blue);
    }

    .caution-row.red {
      background: var(--red);
    }

    .caution-row.neutral {
      background: var(--neutral-1);
      color: var(--neutral-3);
    }

    .entry-box.period-end {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0;
      overflow: hidden;
      background: var(--neutral-1);
      border-color: var(--neutral-3);
    }

    .entry-box.red {
      background: var(--red);
      border-color: var(--red);
    }

    .entry-box.blue {
      background: var(--blue);
      border-color: var(--blue);
    }

    .entry-box.next {
      background: var(--neutral-1);
      border-color: var(--neutral-3);
      border-style: dashed;
      color: var(--neutral-3);
    }

    .entry-box.cursor {
      border-color: var(--neutral-3);
      box-shadow: 0 0 0 0.125rem #fff, 0 0 0 0.25rem var(--neutral-3);
    }

    .entry-time {
      font-size: 0.5rem;
      color: var(--neutral-3);
      font-variant-numeric: tabular-nums;
    }

    .correction-bar {
      display: flex;
      gap: 0.3rem;
      align-items: center;
      flex-wrap: wrap;
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 0.35rem;
      background: #fff;
    }

    .correction-action {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      color: var(--neutral-3);
      font-weight: 700;
      padding: 0.24rem 0.5rem;
      white-space: nowrap;
    }

    .correction-action.primary {
      background: var(--neutral-3);
      border-color: var(--neutral-3);
      color: #fff;
    }

    #completion-form {
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: var(--neutral-1);
      padding: 0.4rem;
      display: grid;
      gap: 0.3rem;
      transition: background 0.2s, border-color 0.2s;
    }

    #completion-form.winner-red {
      background: color-mix(in srgb, var(--red) 12%, white);
      border-color: var(--red);
    }

    #completion-form.winner-blue {
      background: color-mix(in srgb, var(--blue) 12%, white);
      border-color: var(--blue);
    }

    #completion-form select {
      min-height: 2rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      padding: 0 0.4rem;
      background: #fff;
      width: 100%;
    }

    .compl-points-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem;
    }

    .compl-points {
      border: 0.0625rem solid;
      border-radius: 0.375rem;
      min-height: 2rem;
      text-align: center;
      font-weight: 600;
      padding: 0 0.3rem;
      width: 100%;
      background: #fff; /* shared between both colour variants and disabled state */
    }

    .compl-points.red  { border-color: var(--red);  color: var(--red);  }
    .compl-points.blue { border-color: var(--blue); color: var(--blue); }

    .compl-points:disabled {
      border-color: var(--border);
      color: var(--neutral-3);
      background: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Time modification modal                                              */
    /* ------------------------------------------------------------------ */
    #time-mod-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #time-mod-popup {
      background: #fff;
      border: 0.125rem solid var(--neutral-3);
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      min-width: 14rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      box-shadow: 0 0.25rem 1.5rem rgba(0, 0, 0, 0.25);
    }

    #time-mod-title {
      font-weight: 700;
      font-size: 1.05em;
    }

    #time-mod-hint {
      font-size: 0.82em;
      color: var(--neutral-3);
    }

    #time-mod-input {
      font-size: 1.75em;
      text-align: center;
      font-variant-numeric: tabular-nums;
      border: 0.125rem solid var(--border);
      border-radius: 0.375rem;
      padding: 0.2rem 0.5rem;
      width: 100%;
    }

    #time-mod-input:focus {
      outline: none;
      border-color: var(--neutral-3);
    }

    #time-mod-input.invalid {
      border-color: var(--red);
    }

    #time-mod-error {
      color: var(--red);
      font-size: 0.8em;
    }

    #time-mod-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 0.25rem;
    }

    #time-mod-cancel {
      padding: 0.375rem 0.75rem;
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      background: #fff;
      cursor: pointer;
      font-size: 0.9em;
    }

    #time-mod-confirm {
      padding: 0.375rem 0.875rem;
      border: 0.0625rem solid var(--neutral-3);
      border-radius: 0.375rem;
      background: var(--neutral-3);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9em;
    }

  </style>
</head>
<body>
  <main id="app" class="app" aria-label="CHAMP Protocol Prototype">
    <section id="top-bar" class="top-bar" aria-label="Scoresheet Header">
      <input id="bout-info" class="field" type="text" value="Wettkampf: Landesmeisterschaft; U17 74kg" aria-label="Bout Info" />
      <select id="style-select" class="select" aria-label="Style">
        <option selected>Freestyle</option>
        <option>Greco-Roman</option>
      </select>
      <select id="ruleset-select" class="select" aria-label="Ruleset">
        <option selected>Default Ruleset</option>
      </select>
    </section>

    <section id="board" class="board" aria-label="Bout Area">
      <article id="side-red" class="side red" aria-label="Wrestler Red">
        <header id="info-red" class="side-head"><button class="action" type="button" aria-label="Bearbeiten">✎</button><span>Rot</span></header>
        <div id="score-red" class="score" aria-label="Score Red">0</div>
      </article>

      <article id="side-blue" class="side blue" aria-label="Wrestler Blue">
        <header id="info-blue" class="side-head"><span>Blau</span><button class="action" type="button" aria-label="Bearbeiten">✎</button></header>
        <div id="score-blue" class="score" aria-label="Score Blue">0</div>
      </article>
    </section>

    <section id="timeline" class="timeline" aria-label="Timeline">
      <!-- Events will be added dynamically -->
    </section>

    <section id="buttons" class="buttons" aria-label="Bout Buttons">
      <article id="buttons-red" class="button-side red" aria-label="Red Button Column">
        <div class="injury-grid" aria-label="Red Injury Times">
          <button id="injury-time-red" class="mini-time" type="button">TIR 0:00</button>
          <button id="blood-time-red" class="mini-time" type="button">TBR 0:00</button>
        </div>
        <div id="event-buttons-red" class="event-grid" aria-label="Red Event Buttons">
          <button class="event-btn" type="button">[1R]</button>
          <button class="event-btn" type="button">[4R]</button>
          <button class="event-btn" type="button">[5R]</button>
          <button class="event-btn" type="button">[2R]</button>
          <button class="event-btn" type="button">[PR]</button>
          <button class="event-btn" type="button">[0R1B]</button>
          <button class="event-btn" type="button">[0R2B]</button>
        </div>
      </article>

      <article id="center" class="center" aria-label="Timing">
        <button class="bout-time" type="button" id="bout-time-button" aria-label="Bout Time Toggle">
          <div class="time-label">Kampfzeit</div>
          <div id="bout-time-display" class="time" data-fraction="0" aria-live="polite">3:00</div>
          <div class="time-note">[Leertaste]</div>
        </button>
        <div id="completion-form" aria-label="Completion Form">
          <select id="compl-winner" aria-label="Winner" disabled>
            <option value="-">-</option>
            <option value="red">Rot</option>
            <option value="blue">Blau</option>
          </select>
          <select id="compl-victory-type" aria-label="Victory Type" disabled>
          </select>
          <div class="compl-points-row">
            <input id="compl-points-red" class="compl-points red" type="number" min="0" value="0" aria-label="Red Points" disabled />
            <input id="compl-points-blue" class="compl-points blue" type="number" min="0" value="0" aria-label="Blue Points" disabled />
          </div>
        </div>
        <button id="release-complete-button" class="action" type="button" aria-label="Release">Freigeben [F4]</button>
        <button id="export-button" class="action" type="button" style="display:none" aria-label="Export">Exportieren [F8]</button>
      </article>

      <article id="buttons-blue" class="button-side blue" aria-label="Blue Button Column">
        <div class="injury-grid" aria-label="Blue Injury Times">
          <button id="blood-time-blue" class="mini-time" type="button">TBB 0:00</button>
          <button id="injury-time-blue" class="mini-time" type="button">TIB 0:00</button>
        </div>
        <div id="event-buttons-blue" class="event-grid" aria-label="Blue Event Buttons">
            <button class="event-btn" type="button">[5B]</button>
            <button class="event-btn" type="button">[4B]</button>
            <button class="event-btn" type="button">[1B]</button>
            <button class="event-btn" type="button">[0B1R]</button>
            <button class="event-btn" type="button">[PB]</button>
            <button class="event-btn" type="button">[2B]</button>
            <button class="event-btn" type="button">[0B2R]</button>
        </div>
      </article>
    </section>
  </main>

  <!-- Bout time modification modal -->
  <div id="time-mod-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="time-mod-title">
    <div id="time-mod-popup">
      <div id="time-mod-title">Kampfzeit ändern [TT]</div>
      <div id="time-mod-hint">Verbleibende Zeit eingeben (M:SS)</div>
      <input id="time-mod-input" type="text" pattern="\d+:[0-5]\d" placeholder="M:SS" maxlength="5" autocomplete="off" />
      <div id="time-mod-error" style="display:none;">Ungültiges Format. Bitte M:SS eingeben.</div>
      <div id="time-mod-actions">
        <button id="time-mod-cancel" type="button">Abbrechen [Esc]</button>
        <button id="time-mod-confirm" type="button">OK [Enter]</button>
      </div>
    </div>
  </div>

  <div style="position: fixed; top: 0; left: 0; opacity: 0; width: 0.625rem; height: 0.625rem;">
    <button id="start" type="button">Start</button>
    <button id="stop" type="button">Stop</button>
  </div>

  <!-- Embedded default ruleset: protocol/rulesets/ruleset-default.json -->
  <script id="default-ruleset" type="application/json">
  {
    "metadata": {
      "name": "de-mannschaftskampf-2025",
      "description": "Deutsches Regelwerk für Mannschaftskämpfe",
      "languages": ["de"],
      "author": "Deutscher Ringer-Bund"
    },
    "periodTimesInSeconds": [180, 180],
    "periodTimeCountingDirection": "Down",
    "periodBreakTimeInSeconds": 30,
    "injuryTimeWithoutBloodInSeconds": 120,
    "injuryTimeWithBloodInSeconds": 240,
    "injuryTimeCountingDirection": "Up",
    "freestyle": {
      "activityTimeInSeconds": 30,
      "activityTimeCountingDirection": "Down",
      "activityTimeCondition": {
        "passivityCount": { "gt": 1 }
      }
    },
    "victoryTypes": [
      { "type": "SS", "description": "Schultersieg", "classificationPoints": { "winner": 4, "looser": 0 } },
      {
        "type": "TÜ",
        "description": "Technische Überlegenheit",
        "classificationPoints": { "winner": 4, "looser": 0 },
        "condition": { "scoreDifference": { "gte": 15 } }
      },
      {
        "type": "PS",
        "description": "Punktsieg",
        "classificationPoints": {
          "winner": [
            [3, { "when": { "scoreDifference": { "gte": 8, "lte": 14 } } }],
            [2, { "when": { "scoreDifference": { "gte": 3, "lte": 7 } } }],
            [1, { "when": { "scoreDifference": { "gte": 0, "lte": 2 } } }]
          ],
          "looser": 0
        }
      },
      { "type": "AS", "description": "Aufgabesieg", "classificationPoints": { "winner": 4, "looser": 0 } },
      { "type": "DV", "description": "Disqualifikation durch 3 Verwarnungen", "classificationPoints": { "winner": 4, "looser": 0 }, "condition": { "cautionCount": { "gte": 3 } } },
      { "type": "DQ", "description": "Disqualifikation durch unfaires Verhalten", "classificationPoints": { "winner": 4, "looser": 0 } },
      { "type": "DSQ2", "description": "Beide Ringer disqualifiziert wegen unfairem Verhalten", "classificationPoints": { "winner": 0, "looser": 0 } },
      { "type": "KL", "description": "Kampfloser Sieg", "classificationPoints": { "winner": 4, "looser": 0 } },
      { "type": "ÜG", "description": "Übergewicht", "classificationPoints": { "winner": 4, "looser": 0 } }
    ]
  }
  </script>

  <script>
    // ===================================================================
    // APP STATE
    // ===================================================================
    const appState = {
      mode: 'New', // 'New' | 'Recording' | 'Completing' | 'Completed' | 'Re-released'
      timerRunning: false,
      timerIntervalId: null,
      boutTime100ms: 0, // in 100ms units
      periodTime100ms: 1800, // 3 minutes = 180 seconds = 1800 * 100ms units
      sequenceCounter: 0,
      events: [],
      createdAt: null,
      completed: false,
      completedAt: null,
      winner: null,
      victoryType: null,
      victoryDescription: null,
      classificationPoints: null,
      keyBuffer: [],
      currentPeriodIndex: 0,
      breakTimerRunning: false,
      breakTime100ms: 0
    };

    // ===================================================================
    // TIMER LOGIC
    // ===================================================================
    const boutTimeDisplay = document.getElementById("bout-time-display");
    const startButton = document.getElementById("start");
    const stopButton = document.getElementById("stop");
    const boutTimeButton = document.getElementById("bout-time-button");

    // Test-only functions that bypass mode checks
    function testStartTimer() {
      if (appState.timerIntervalId !== null) return;
      appState.timerRunning = true;
      appState.timerIntervalId = setInterval(tick, 100);
    }

    function testStopTimer() {
      if (appState.timerIntervalId === null) return;
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.timerRunning = false;
    }

    function formatTime100ms(time100ms) {
      const totalSeconds = Math.floor(time100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      const fraction = Math.floor((time100ms % 10));
      return `${minutes}:${seconds.toString().padStart(2, "0")}.${fraction}`;
    }

    function updateBoutTimeDisplay() {
      // Display minutes:seconds as the textual content (keeps compatibility
      // with existing tests and assistive technologies) and expose the
      // 100ms digit through a data attribute that is rendered visually
      // as a superscript via CSS ::after.
      const totalSeconds = Math.floor(appState.periodTime100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      boutTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
      const fraction = Math.floor(appState.periodTime100ms % 10);
      boutTimeDisplay.dataset.fraction = String(fraction);
    }

    function tick() {
      if (!appState.timerRunning) return;
      
      appState.boutTime100ms++;
      appState.periodTime100ms--;
      
      updateBoutTimeDisplay();
      
      if (appState.periodTime100ms <= 0) {
        stopTimer();
        if (appState.mode === 'Recording') {
          recordEvent({ eventType: 'PeriodEnd', boutTime100ms: appState.boutTime100ms });
          const ruleset = loadEmbeddedRuleset();
          const nextPeriodIndex = appState.currentPeriodIndex + 1;
          if (ruleset && nextPeriodIndex < ruleset.periodTimesInSeconds.length) {
            appState.currentPeriodIndex = nextPeriodIndex;
            startPeriodBreak(ruleset.periodBreakTimeInSeconds);
          } else {
            boutTimeButton.disabled = true;
          }
        }
      }
    }

    function updateBreakTimeDisplay() {
      const totalSeconds = Math.floor(appState.breakTime100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      boutTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;
      boutTimeDisplay.dataset.fraction = String(Math.floor(appState.breakTime100ms % 10));
    }

    function startPeriodBreak(breakSeconds) {
      appState.breakTime100ms = breakSeconds * 10;
      appState.breakTimerRunning = true;
      boutTimeButton.classList.add('break-mode');
      boutTimeButton.querySelector('.time-label').textContent = 'Kampfpause';
      boutTimeButton.querySelector('.time-note').textContent = '[Leertaste] → Abbruch';
      updateBreakTimeDisplay();
      appState.timerIntervalId = setInterval(tickBreak, 100);
    }

    function tickBreak() {
      appState.breakTime100ms--;
      updateBreakTimeDisplay();
      if (appState.breakTime100ms <= 0) {
        endPeriodBreak();
      }
    }

    function endPeriodBreak() {
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.breakTimerRunning = false;
      const ruleset = loadEmbeddedRuleset();
      const nextPeriodTime = ruleset.periodTimesInSeconds[appState.currentPeriodIndex] ?? 180;
      appState.periodTime100ms = nextPeriodTime * 10;
      boutTimeButton.classList.remove('break-mode');
      boutTimeButton.querySelector('.time-label').textContent = 'Kampfzeit';
      boutTimeButton.querySelector('.time-note').textContent = '[Leertaste]';
      updateBoutTimeDisplay();
    }

    function startTimer() {
      if (appState.mode !== 'Recording') return;
      if (appState.timerIntervalId !== null) return;
      
      appState.timerRunning = true;
      appState.timerIntervalId = setInterval(tick, 100); // 100ms intervals
      recordEvent({ eventType: 'T_Started', boutTime100ms: appState.boutTime100ms });
    }

    function stopTimer() {
      if (appState.timerIntervalId === null) return;
      
      clearInterval(appState.timerIntervalId);
      appState.timerIntervalId = null;
      appState.timerRunning = false;
      
      recordEvent({ eventType: 'T_Stopped', boutTime100ms: appState.boutTime100ms });
    }

    function toggleTimer() {
      if (appState.mode !== 'Recording') return;
      
      if (appState.timerRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    }

    startButton.addEventListener("click", testStartTimer);
    stopButton.addEventListener("click", testStopTimer);
    boutTimeButton.addEventListener("click", () => {
      if (appState.breakTimerRunning) {
        endPeriodBreak();
      } else {
        toggleTimer();
      }
    });
    updateBoutTimeDisplay();

    // ===================================================================
    // TIME MODIFICATION MODE
    // ===================================================================
    function isTimeModModalOpen() {
      return document.getElementById('time-mod-modal').style.display !== 'none';
    }

    function openTimeModModal() {
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return;

      // Only allow opening the time modification modal when the bout timer
      // is stopped. This prevents race conditions and ambiguous edits.
      if (appState.timerRunning) {
        return;
      }

      const modal = document.getElementById('time-mod-modal');
      const input = document.getElementById('time-mod-input');
      const error = document.getElementById('time-mod-error');

      // Pre-fill with remaining period time in M:SS
      const totalSeconds = Math.floor(appState.periodTime100ms / 10);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      input.value = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      input.classList.remove('invalid');
      error.style.display = 'none';

      modal.style.display = 'flex';
      input.focus();
      input.select();

      appState.keyBuffer = [];
      updateNextEventDisplay();
    }

    function closeTimeModModal() {
      document.getElementById('time-mod-modal').style.display = 'none';
      appState.keyBuffer = [];
      updateNextEventDisplay();
    }

    function confirmTimeModChange() {
      const input = document.getElementById('time-mod-input');
      const error = document.getElementById('time-mod-error');
      const val = input.value.trim();

      const match = val.match(/^(\d+):([0-5]\d)$/);
      if (!match) {
        input.classList.add('invalid');
        error.style.display = '';
        input.focus();
        input.select();
        return;
      }

      const minutes = parseInt(match[1]);
      const seconds = parseInt(match[2]);
      const newPeriodTime100ms = (minutes * 60 + seconds) * 10;

      // Validate against ruleset-defined period length. If the entered
      // remaining time exceeds the configured period length, show an error
      // and keep the modal open so the user can correct the value.
      const ruleset = loadEmbeddedRuleset();
      const maxPeriodTime100ms = (ruleset?.periodTimesInSeconds?.[appState.currentPeriodIndex] ?? 180) * 10;
      if (newPeriodTime100ms > maxPeriodTime100ms) {
        input.classList.add('invalid');
        error.textContent = 'Eingegebene Zeit überschreitet die Periodenlänge.';
        error.style.display = '';
        input.focus();
        input.select();
        return;
      }

      // Compute cumulated boutTime by adjusting the current elapsed offset:
      // newBoutTime = boutTime + (oldRemainingPeriodTime - newRemainingPeriodTime)
      const newBoutTime100ms = appState.boutTime100ms + appState.periodTime100ms - newPeriodTime100ms;
      const oldBoutTime100ms = appState.boutTime100ms;

      appState.boutTime100ms = newBoutTime100ms;
      appState.periodTime100ms = newPeriodTime100ms;
      updateBoutTimeDisplay();

      recordEvent({
        eventType: 'T_Modified',
        boutTime100ms: oldBoutTime100ms,
        newTime: newBoutTime100ms
      });

      closeTimeModModal();
    }

    document.getElementById('time-mod-confirm').addEventListener('click', confirmTimeModChange);
    document.getElementById('time-mod-cancel').addEventListener('click', closeTimeModModal);

    // Handle Enter / Escape inside the modal input without propagating to
    // the main keydown handler.
    document.getElementById('time-mod-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.stopPropagation();
        confirmTimeModChange();
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        e.stopPropagation();
        closeTimeModModal();
      }
    });

    // ===================================================================
    // EVENT RECORDING
    // ===================================================================
    function recordEvent(eventData) {
      appState.sequenceCounter++;
      const event = {
        seq: appState.sequenceCounter,
        timestamp: new Date().toISOString(),
        ...eventData
      };
      appState.events.push(event);
      
      // Update UI after recording event
      updateScores();
      updateTimeline();
      
      console.log('Event recorded:', event);
      return event;
    }

    // ===================================================================
    // STATE MANAGEMENT
    // ===================================================================
    const releaseCompleteButton = document.getElementById('release-complete-button');
    const exportButton = document.getElementById('export-button');
    const boutInfoField = document.getElementById('bout-info');
    const styleSelect = document.getElementById('style-select');
    const rulesetSelect = document.getElementById('ruleset-select');
    const timeline = document.getElementById('timeline');

    function populateVictoryTypes() {
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const ruleset = loadEmbeddedRuleset();
      victoryTypeSelect.innerHTML = '<option value="-">-</option>';
      if (ruleset && Array.isArray(ruleset.victoryTypes)) {
        ruleset.victoryTypes.forEach(vt => {
          const option = document.createElement('option');
          option.value = vt.type;
          option.textContent = `${vt.type}-${vt.description}`;
          option.dataset.classificationPoints = JSON.stringify(vt.classificationPoints);
          option.dataset.description = vt.description;
          victoryTypeSelect.appendChild(option);
        });
      }
    }

    // Toggle disabled state on all event buttons and the bout-time button.
    function setEventButtonsFrozen(frozen) {
      document.querySelectorAll('.event-btn').forEach(btn => { btn.disabled = frozen; });
      document.getElementById('bout-time-button').disabled = frozen;
    }

    // Lock or unlock the top-bar scoresheet header fields.
    function lockTopBar(locked) {
      boutInfoField.disabled = locked;
      styleSelect.disabled   = locked;
      rulesetSelect.disabled = locked;
    }

    function applyState(state) {
      appState.mode = state;

      const form         = document.getElementById('completion-form');
      const formControls = form.querySelectorAll('select, input');

      // Freeze or unfreeze the completion form controls.
      const freezeForm   = () => { formControls.forEach(el => { el.disabled = true;  }); };
      const unfreezeForm = () => { formControls.forEach(el => { el.disabled = false; }); };

      // State-specific labels, locks and visibility.
      // Format: [buttonLabel, freezeForm, freezeEventBtns, showExport, lockTopBar]
      const cfg = {
        'New':         ['Freigeben [F4]',   true,  true,  false, false],
        'Recording':   ['Fertigstellen [F4]', true, false, false, true ],
        'Completing':  ['Abschließen [F4]', false, false, false, true ],
        'Completed':   ['Korrigieren [F4]', true,  true,  true,  true ],
        'Re-released': ['Abschließen [F4]', false, false, false, false],
      };

      const [label, doFreezeForm, doFreezeEvt, showExport, doLockTopBar] = cfg[state];
      releaseCompleteButton.textContent = label;
      doFreezeForm ? freezeForm() : unfreezeForm();
      setEventButtonsFrozen(doFreezeEvt);
      exportButton.style.display = showExport ? '' : 'none';
      lockTopBar(doLockTopBar);

      updateTimeline();
    }

    function releaseScoresheet() {
      if (appState.mode !== 'New') return;

      appState.createdAt = new Date().toISOString();
      recordEvent({ eventType: 'ScoresheetReleased' });
      applyState('Recording');

      console.log('Scoresheet released for recording');
    }

    function startCompleting() {
      if (appState.mode !== 'Recording') return;

      // Stop timer if running
      if (appState.timerRunning) {
        stopTimer();
      }

      applyState('Completing');
      console.log('Entering Completing state');
    }

    function readFormAndComplete() {
      const winnerSelect = document.getElementById('compl-winner');
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const redInput = document.getElementById('compl-points-red');
      const blueInput = document.getElementById('compl-points-blue');

      const winner = winnerSelect.value === '-' ? 'none' : winnerSelect.value;
      const victoryType = victoryTypeSelect.value;
      const selectedOption = victoryTypeSelect.options[victoryTypeSelect.selectedIndex];
      const victoryDescription = selectedOption ? (selectedOption.dataset.description || '') : '';
      const redPoints = parseInt(redInput.value) || 0;
      const bluePoints = parseInt(blueInput.value) || 0;

      // Store as [winner, loser] regardless of which colour side won
      const winnerPoints = winner === 'blue' ? bluePoints : redPoints;
      const loserPoints  = winner === 'blue' ? redPoints  : bluePoints;

      completeScoresheet(winner, victoryType, victoryDescription, [winnerPoints, loserPoints]);
    }

    function completeScoresheet(winner, victoryType, victoryDescription, classificationPoints) {
      if (appState.mode !== 'Completing' && appState.mode !== 'Re-released') return;

      appState.completed = true;
      appState.completedAt = new Date().toISOString();
      appState.winner = winner;
      appState.victoryType = victoryType;
      appState.victoryDescription = victoryDescription;
      appState.classificationPoints = classificationPoints;

      recordEvent({
        eventType: 'ScoresheetCompleted',
        victoryType: victoryType,
        classificationPoints: classificationPoints
      });

      applyState('Completed');
      console.log('Scoresheet completed:', victoryType, classificationPoints);
    }

    function rereleaseScoresheet() {
      if (appState.mode !== 'Completed') return;

      applyState('Re-released');
      console.log('Scoresheet re-released for correction');
    }

    function updateCompletionPoints() {
      const form = document.getElementById('completion-form');
      const winnerSelect = document.getElementById('compl-winner');
      const victoryTypeSelect = document.getElementById('compl-victory-type');
      const redInput = document.getElementById('compl-points-red');
      const blueInput = document.getElementById('compl-points-blue');

      const selectedOption = victoryTypeSelect.options[victoryTypeSelect.selectedIndex];
      if (!selectedOption) return;

      let winnerPts = 0;
      let loserPts = 0;
      try {
        const cp = JSON.parse(selectedOption.dataset.classificationPoints || 'null');
        if (cp) {
          const context = getBoutContext();
          const resolved = resolveClassificationPoints(cp, context);
          winnerPts = resolved.winner;
          loserPts = resolved.looser;
        }
      } catch (e) {
        // ignore parse errors
      }

      const winner = winnerSelect.value;

      if (winner === 'blue') {
        redInput.value = loserPts;
        blueInput.value = winnerPts;
      } else {
        redInput.value = winnerPts;
        blueInput.value = loserPts;
      }

      // Color background by winner
      form.classList.toggle('winner-red', winner === 'red');
      form.classList.toggle('winner-blue', winner === 'blue');
    }

    document.getElementById('compl-winner').addEventListener('change', updateCompletionPoints);
    document.getElementById('compl-victory-type').addEventListener('change', updateCompletionPoints);
    exportButton.addEventListener('click', downloadExport);

    // Centralised action for the release/complete button and F4 shortcut.
    function handleReleaseCompleteAction() {
      switch (appState.mode) {
        case 'New':         releaseScoresheet();  break;
        case 'Recording':   startCompleting();    break;
        case 'Completing':  readFormAndComplete(); break;
        case 'Completed':   rereleaseScoresheet(); break;
        case 'Re-released': readFormAndComplete(); break;
      }
    }

    releaseCompleteButton.addEventListener('click', () => {
      handleReleaseCompleteAction();
      // Remove focus so Space won't re-trigger this button
      releaseCompleteButton.blur();
    });

    // Prevent Space from activating the button when focused – Space toggles the timer.
    releaseCompleteButton.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.key === ' ') e.preventDefault();
    });

    // ===================================================================
    // SCORE CALCULATION
    // ===================================================================
    const scoreRedDisplay = document.getElementById('score-red');
    const scoreBlueDisplay = document.getElementById('score-blue');

    function calculateScores(events) {
      const scores = { red: 0, blue: 0 };
      
      events.forEach(e => {
        // Technical points: 1R, 2R, 4R, 5R, 1B, 2B, 4B, 5B
        const pointMatch = e.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) {
          const points = parseInt(pointMatch[1]);
          const side = pointMatch[2] === 'R' ? 'red' : 'blue';
          scores[side] += points;
        }
        
        // Cautions award points to opponent: 0R1B, 0R2B, 0B1R, 0B2R
        const cautionMatch = e.eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) {
          const points = parseInt(cautionMatch[2]);
          const recipient = cautionMatch[3] === 'R' ? 'red' : 'blue';
          scores[recipient] += points;
        }
      });
      
      return scores;
    }

    function updateScores() {
      const scores = calculateScores(appState.events);
      scoreRedDisplay.textContent = scores.red;
      scoreBlueDisplay.textContent = scores.blue;
    }

    // ===================================================================
    // TIMELINE RENDERING
    // ===================================================================
    function updateTimeline() {
      timeline.innerHTML = '';
      
      // Filter to only bout events with bout time
      const boutEvents = appState.events.filter(e => 
        e.boutTime100ms !== undefined && 
        !e.eventType.startsWith('T_') &&
        e.eventType !== 'ScoresheetReleased' &&
        e.eventType !== 'ScoresheetCompleted'
      );
      
      let runningRed = 0, runningBlue = 0, periodRed = 0, periodBlue = 0, periodCount = 0;
      boutEvents.forEach(event => {
        const pointMatch = event.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) {
          const pts = parseInt(pointMatch[1]);
          if (pointMatch[2] === 'R') { runningRed += pts; periodRed += pts; }
          else { runningBlue += pts; periodBlue += pts; }
        }
        const cautionMatch = event.eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) {
          const pts = parseInt(cautionMatch[2]);
          if (cautionMatch[3] === 'R') { runningRed += pts; periodRed += pts; }
          else { runningBlue += pts; periodBlue += pts; }
        }
        let context = null;
        if (event.eventType === 'PeriodEnd') {
          periodCount++;
          context = { periodNumber: periodCount, scoreRed: periodRed, scoreBlue: periodBlue };
          periodRed = 0;
          periodBlue = 0;
        }
        const entry = createTimelineEntry(event, context);
        timeline.appendChild(entry);
      });
      
      // Add next-event entry if in Recording or Completing mode
      if (appState.mode === 'Recording' || appState.mode === 'Completing') {
        const nextEventEntry = document.createElement('div');
        nextEventEntry.id = 'next-event';
        nextEventEntry.className = 'entry';
        // Placeholder – will be filled by updateNextEventDisplay()
        nextEventEntry.innerHTML = `
          <div class="entry-box next cursor">+</div>
          <div class="entry-time">Next</div>
        `;
        timeline.appendChild(nextEventEntry);
        updateNextEventDisplay();
      }
    }

    function createTimelineEntry(event, context) {
      const entry = document.createElement('div');
      entry.className = 'entry';
      
      const eventType = event.eventType;
      let boxHtml = '';
      
      // Check if it's a PeriodEnd event
      if (eventType === 'PeriodEnd' && context) {
        const { periodNumber, scoreRed, scoreBlue } = context;
        const winnerClass = scoreRed > scoreBlue ? 'red' : (scoreBlue > scoreRed ? 'blue' : 'neutral');
        boxHtml = `
          <div class="entry-box period-end">
            <div class="caution-row neutral">#${periodNumber}</div>
            <div class="caution-row ${winnerClass}">${scoreRed}:${scoreBlue}</div>
          </div>
        `;
      } else {
        // Check if it's a caution event (0R1B, 0R2B, 0B1R, 0B2R)
        const cautionMatch = eventType.match(/^0([RB])([12])([RB])$/);
        if (cautionMatch) {
          const cautionSide = cautionMatch[1] === 'R' ? 'red' : 'blue';
          const pointSide = cautionMatch[3] === 'R' ? 'red' : 'blue';
          boxHtml = `
            <div class="entry-box caution ${cautionSide === 'red' ? 'red' : 'blue'}">
              <div class="caution-row ${cautionSide}">0${cautionMatch[1]}</div>
              <div class="caution-row ${pointSide}">${cautionMatch[2]}${cautionMatch[3]}</div>
            </div>
          `;
        } else {
          // Regular event (points or passivity)
          const colorClass = eventType.includes('R') ? 'red' : (eventType.includes('B') ? 'blue' : 'next');
          boxHtml = `<div class="entry-box ${colorClass}">${eventType}</div>`;
        }
      }
      
      entry.innerHTML = `
        ${boxHtml}
        <div class="entry-time">${formatTime100ms(event.boutTime100ms)}</div>
      `;
      
      return entry;
    }

    // ===================================================================
    // NEXT-EVENT DISPLAY
    // ===================================================================
    /**
     * Derive display data from the current key buffer.
     * Returns an object describing how to render the next-event entry-box.
     */
    function getNextEventDisplayData(buffer) {
      if (buffer.length === 0) {
        return { type: 'neutral', text: '+' };
      }

      const seq = buffer.map(k => k.toUpperCase()).join('');
      const hasR = seq.includes('R');
      const hasB = seq.includes('B');
      const has0 = seq.includes('0');

      // Caution sequence: color has been identified and 0 is present
      if (has0 && (hasR || hasB)) {
        const cautionColor = hasR ? 'red' : 'blue';
        const cautionKey   = hasR ? 'R'   : 'B';
        const oppColor     = hasR ? 'blue' : 'red';
        const oppKey       = hasR ? 'B'   : 'R';
        return { type: 'caution', cautionColor, cautionLabel: '0' + cautionKey, oppColor, oppLabel: oppKey };
      }

      // Color identified without 0: use the color   
      if (hasR) return { type: 'color', color: 'red',  text: seq };
      if (hasB) return { type: 'color', color: 'blue', text: seq };

      // Neutral: digit alone, P alone, 0 alone, T alone
      return { type: 'neutral', text: seq };
    }

    /**
     * Update the #next-event entry to reflect the current key buffer state.
     * Called after every buffer mutation and when the timeline is rebuilt.
     */
    function updateNextEventDisplay() {
      const nextEvent = document.getElementById('next-event');
      if (!nextEvent) return;

      const data = getNextEventDisplayData(appState.keyBuffer);
      let boxHtml;

      if (data.type === 'caution') {
        boxHtml = `
          <div class="entry-box caution ${data.cautionColor} cursor">
            <div class="caution-row ${data.cautionColor}">${data.cautionLabel}</div>
            <div class="caution-row ${data.oppColor}">${data.oppLabel}</div>
          </div>`;
      } else if (data.type === 'color') {
        boxHtml = `<div class="entry-box ${data.color} cursor">${data.text}</div>`;
      } else {
        boxHtml = `<div class="entry-box next cursor">${data.text}</div>`;
      }

      nextEvent.innerHTML = `${boxHtml}
        <div class="entry-time">Next</div>`;
    }

    // ===================================================================
    // KEYBOARD INPUT HANDLER
    // ===================================================================
    function processKeySequence(buffer) {
      const seq = buffer.join('').toUpperCase();
      
      // Only process bout events in Recording or Completing mode
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') return false;
      
      // TT: open time modification modal
      if (seq === 'TT') {
        openTimeModModal();
        return true;
      }

      // Space: abort period break if active, otherwise toggle timer (only in Recording mode)
      if (seq === ' ') {
        if (appState.breakTimerRunning) {
          endPeriodBreak();
          return true;
        }
        const isRecording = appState.mode === 'Recording';
        if (isRecording) toggleTimer();
        return isRecording;
      }
      
      // Technical points: R1, 1R, R2, 2R, R4, 4R, R5, 5R, B1, 1B, B2, 2B, B4, 4B, B5, 5B
      if (seq.match(/^[RB][1245]$/)) {
        const points = seq[1];
        const side = seq[0];
        recordEvent({ eventType: `${points}${side}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      if (seq.match(/^[1245][RB]$/)) {
        const points = seq[0];
        const side = seq[1];
        recordEvent({ eventType: `${points}${side}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      
      // Passivity: RP, PR, BP, PB
      if (seq === 'RP' || seq === 'PR') {
        recordEvent({ eventType: 'PR', boutTime100ms: appState.boutTime100ms });
        return true;
      }
      if (seq === 'BP' || seq === 'PB') {
        recordEvent({ eventType: 'PB', boutTime100ms: appState.boutTime100ms });
        return true;
      }
      
      // Cautions: R01, 0R1, R02, 0R2, B01, 0B1, B02, 0B2
      if (seq.match(/^[RB]0[12]$/)) {
        const cautionSide = seq[0];
        const points = seq[2];
        const pointSide = cautionSide === 'R' ? 'B' : 'R';
        recordEvent({ eventType: `0${cautionSide}${points}${pointSide}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      if (seq.match(/^0[RB][12]$/)) {
        const cautionSide = seq[1];
        const points = seq[2];
        const pointSide = cautionSide === 'R' ? 'B' : 'R';
        recordEvent({ eventType: `0${cautionSide}${points}${pointSide}`, boutTime100ms: appState.boutTime100ms });
        return true;
      }
      
      return false;
    }

    function isValidContinuation(buffer, key) {
      const seq = buffer.join('').toUpperCase();
      const newKey = key.toUpperCase();
      
      // Empty buffer - accept most keys
      if (buffer.length === 0) {
        return ['R', 'B', 'P', '1', '2', '4', '5', '0', ' ', 'T'].includes(newKey);
      }
      
      // Single key sequences
      if (buffer.length === 1) {
        if (seq === 'R') return ['1', '2', '4', '5', 'P', '0'].includes(newKey);
        if (seq === 'B') return ['1', '2', '4', '5', 'P', '0'].includes(newKey);
        if (seq === 'P') return ['R', 'B'].includes(newKey);
        if (['1', '2', '4', '5'].includes(seq)) return ['R', 'B'].includes(newKey);
        if (seq === '0') return ['R', 'B'].includes(newKey);
        if (seq === 'T') return newKey === 'T';
      }
      
      // Two key sequences
      if (buffer.length === 2) {
        if (seq === 'R0') return ['1', '2'].includes(newKey);
        if (seq === 'B0') return ['1', '2'].includes(newKey);
        if (seq === '0R') return ['1', '2'].includes(newKey);
        if (seq === '0B') return ['1', '2'].includes(newKey);
      }
      
      return false;
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;

      // If the time modification modal is open, let the modal input handle
      // its own keystrokes. Block F4/F8 and all other shortcuts.
      if (isTimeModModalOpen()) return;
      
      // Handle function keys directly (F4, F8)
      if (key === 'F4') {
        handleReleaseCompleteAction();
        e.preventDefault();
        return;
      }
      
      if (key === 'F8' && appState.mode === 'Completed') {
        downloadExport();
        e.preventDefault();
        return;
      }
      
      // Escape clears buffer
      if (key === 'Escape') {
        appState.keyBuffer = [];
        updateNextEventDisplay();
        console.log('Key buffer cleared');
        return;
      }
      
      // Check if key is valid continuation
      if (!isValidContinuation(appState.keyBuffer, key)) {
        // Invalid key - ignore
        console.log('Invalid key for current buffer:', key);
        return;
      }
      
      // Add to buffer
      appState.keyBuffer.push(key);
      updateNextEventDisplay();
      console.log('Key buffer:', appState.keyBuffer);
      
      // Try to process sequence
      if (processKeySequence(appState.keyBuffer)) {
        // Sequence processed - clear buffer and suppress default key action so
        // the key character is not typed into any newly-focused input (e.g.
        // the time-modification modal input that may be opened by TT).
        appState.keyBuffer = [];
        updateNextEventDisplay();
        e.preventDefault();
        console.log('Sequence processed, buffer cleared');
      }
    });

    // ===================================================================
    // EVENT BUTTON CLICK HANDLERS
    // ===================================================================
    
    /**
     * Simulates a key sequence by pushing keys to buffer and processing them.
     * @param {string[]} keys - Array of keys to simulate pressing in sequence
     */
    function simulateKeySequence(keys) {
      // Check if we're in a valid mode for recording events
      if (appState.mode !== 'Recording' && appState.mode !== 'Completing') {
        console.log('Cannot record events in mode:', appState.mode);
        return;
      }
      
      // Process each key in the sequence
      for (const key of keys) {
        // Check if key is valid continuation
        if (!isValidContinuation(appState.keyBuffer, key)) {
          console.log('Invalid key for current buffer:', key);
          appState.keyBuffer = [];
          return;
        }
        
        // Add to buffer
        appState.keyBuffer.push(key);
      }
      
      console.log('Button clicked, key buffer:', appState.keyBuffer);
      
      // Try to process sequence
      if (processKeySequence(appState.keyBuffer)) {
        // Sequence processed - clear buffer
        appState.keyBuffer = [];
        console.log('Sequence processed, buffer cleared');
      }
    }
    
    /**
     * Attach click handlers to all event buttons.
     * Buttons are labelled like [1R], [PR], [0R1B], [4B], etc.
     * Per UI spec, each click sends the colour key first, then the event key.
     */
    function initializeEventButtons() {
      // Shared setup for both colour sides.
      ['R', 'B'].forEach(color => {
        const opponent   = color === 'R' ? 'B' : 'R';
        const containerId = color === 'R' ? 'event-buttons-red' : 'event-buttons-blue';

        document.querySelectorAll(`#${containerId} .event-btn`).forEach(btn => {
          const label = btn.textContent.trim();
          let keys;

          // Caution button: [0R1B], [0R2B], [0B1R], [0B2R]
          const cautionMatch = label.match(new RegExp(`\\[0${color}([12])${opponent}\\]`));
          if (cautionMatch) {
            keys = [color, '0', cautionMatch[1]];
          } else {
            // Regular point / passivity button: [1R], [PR], [4B] …
            const regularMatch = label.match(new RegExp(`\\[([0-9P]+)${color}\\]`));
            if (regularMatch) keys = [color, regularMatch[1]];
          }

          if (keys) {
            btn.addEventListener('click', () => { simulateKeySequence(keys); btn.blur(); });
            // Prevent Space from re-triggering the button after a click.
            btn.addEventListener('keydown', e => {
              if (e.code === 'Space' || e.key === ' ') e.preventDefault();
            });
          }
        });
      });
    }

    // --- Ruleset helper -------------------------------------------------
    function loadEmbeddedRuleset() {
      const el = document.getElementById('default-ruleset');
      if (!el) return null;
      try {
        return JSON.parse(el.textContent);
      } catch (e) {
        console.error('Failed to parse embedded ruleset:', e);
        return null;
      }
    }

    function simpleValidateRuleset(r) {
      const errors = [];
      if (!r) { errors.push('ruleset missing'); return { valid: false, errors }; }
      if (!r.metadata || typeof r.metadata.name !== 'string') errors.push('metadata.name required');
      if (!Array.isArray(r.periodTimesInSeconds)) errors.push('periodTimesInSeconds array required');
      if (typeof r.periodTimeCountingDirection !== 'string') errors.push('periodTimeCountingDirection required');
      if (typeof r.periodBreakTimeInSeconds !== 'number') errors.push('periodBreakTimeInSeconds required');
      if (!Array.isArray(r.victoryTypes)) errors.push('victoryTypes array required');
      if (Array.isArray(r.victoryTypes)) {
        const typesSeen = new Set();
        r.victoryTypes.forEach((vt, i) => {
          if (typeof vt.type !== 'string') {
            errors.push(`victoryTypes[${i}].type required`);
          } else {
            if (typesSeen.has(vt.type)) errors.push(`victoryTypes[${i}].type "${vt.type}" is not unique`);
            typesSeen.add(vt.type);
          }
          const cp = vt.classificationPoints;
          if (!cp || typeof cp !== 'object' || Array.isArray(cp)) {
            errors.push(`victoryTypes[${i}].classificationPoints must be an object {winner, looser}`);
          } else {
            if (cp.winner === undefined) errors.push(`victoryTypes[${i}].classificationPoints.winner required`);
            if (cp.looser === undefined) errors.push(`victoryTypes[${i}].classificationPoints.looser required`);
          }
          if (vt.condition && typeof vt.condition === 'object') {
            Object.values(vt.condition).forEach(op => {
              if (typeof op !== 'object') errors.push(`victoryTypes[${i}].condition entries must be objects`);
            });
          }
        });
      }
      return { valid: errors.length === 0, errors };
    }

    function evalOperator(value, op, target) {
      if (op.gte !== undefined && !(value >= op.gte)) return false;
      if (op.lte !== undefined && !(value <= op.lte)) return false;
      if (op.gt !== undefined && !(value > op.gt)) return false;
      if (op.lt !== undefined && !(value < op.lt)) return false;
      if (op.eq !== undefined && !(value === op.eq)) return false;
      return true;
    }

    function evaluateCondition(condition, context) {
      if (!condition) return true;
      // All named condition fields must be satisfied (AND)
      for (const key in condition) {
        const op = condition[key];
        const value = context[key];
        if (value === undefined) return false;
        if (!evalOperator(value, op, key)) return false;
      }
      return true;
    }

    function findMatchingVictoryTypes(ruleset, context) {
      if (!ruleset || !Array.isArray(ruleset.victoryTypes)) return [];
      return ruleset.victoryTypes.filter(vt => {
        if (!vt.condition) return true;
        return evaluateCondition(vt.condition, context);
      });
    }

    function resolveClassificationPoints(classificationPoints, context) {
      function resolveValue(v) {
        if (typeof v === 'number') return v;
        if (Array.isArray(v)) {
          for (const entry of v) {
            const [points, opts] = entry;
            if (evaluateCondition(opts.when, context)) return points;
          }
          return 0;
        }
        return 0;
      }
      return {
        winner: resolveValue(classificationPoints.winner),
        looser: resolveValue(classificationPoints.looser)
      };
    }

    function getBoutContext() {
      const scores = calculateScores(appState.events);
      const stats = calculateStatistics(appState.events);
      return {
        scoreDifference: Math.abs(scores.red - scores.blue),
        scoreRed: scores.red,
        scoreBlue: scores.blue,
        cautionCount: stats.red.cautions + stats.blue.cautions,
        passivityCount: stats.red.passivity + stats.blue.passivity
      };
    }

    // Expose helper
    window.rulesetHelper = {
      load: loadEmbeddedRuleset,
      validate: simpleValidateRuleset,
      evaluateCondition,
      findMatchingVictoryTypes,
      resolveClassificationPoints,
      getBoutContext
    };

    // Auto-load and validate at startup (logs result)
    const _embeddedRuleset = loadEmbeddedRuleset();
    const _valid = simpleValidateRuleset(_embeddedRuleset);
    if (!_valid.valid) console.warn('Embedded ruleset validation warnings:', _valid.errors);

    // --- Export functionality --------------------------------------------
    function getSystemMetadata() {
      return {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: Array.from(navigator.languages || [navigator.language]),
        viewport: {
          width: window.innerWidth,
          height: window.innerHeight
        },
        timestamp: new Date().toISOString(),
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset: new Date().getTimezoneOffset()
      };
    }

    function parseInfo(infoString) {
      // Parse key-value pairs from info string (spec: key:value; separator)
      const pairs = {};
      const segments = infoString.split(';').map(s => s.trim());
      let anonCounter = 1;
      
      segments.forEach(seg => {
        if (!seg) return;
        const colonIdx = seg.indexOf(':');
        if (colonIdx === -1) {
          pairs[`$anonym${anonCounter++}`] = seg;
        } else {
          let key = seg.substring(0, colonIdx).trim();
          const value = seg.substring(colonIdx + 1).trim();
          
          if (key.startsWith('$$')) {
            // Hidden pair - don't include in parsedInfo
            return;
          }
          if (key.startsWith('$')) {
            pairs[`anonym${anonCounter++}`] = value;
          } else {
            pairs[key.toLowerCase()] = value;
          }
        }
      });
      return pairs;
    }

    function calculateStatistics(events) {
      const stats = {
        red: {
          technicalPoints: { "1": 0, "2": 0, "4": 0, "5": 0 },
          passivity: 0,
          cautions: 0,
          injuryTime100ms: 0,
          bloodTime100ms: 0
        },
        blue: {
          technicalPoints: { "1": 0, "2": 0, "4": 0, "5": 0 },
          passivity: 0,
          cautions: 0,
          injuryTime100ms: 0,
          bloodTime100ms: 0
        },
        totalEvents: events.length,
        corrections: 0
      };

      events.forEach(e => {
        // Technical points
        const pointMatch = e.eventType.match(/^([1245])(R|B)$/);
        if (pointMatch) {
          const points = pointMatch[1];
          const side = pointMatch[2] === 'R' ? 'red' : 'blue';
          stats[side].technicalPoints[points]++;
        }
        
        // Passivity
        if (e.eventType === 'PR') stats.red.passivity++;
        if (e.eventType === 'PB') stats.blue.passivity++;
        
        // Cautions
        if (e.eventType.match(/^0R[12]B$/)) stats.red.cautions++;
        if (e.eventType.match(/^0B[12]R$/)) stats.blue.cautions++;
        
        // Corrections
        if (e.eventType.startsWith('Event') || e.eventType.includes('_Modified')) {
          stats.corrections++;
        }
      });

      return stats;
    }

    function generateExport() {
      const ruleset = loadEmbeddedRuleset();
      const boutInfo = document.getElementById('bout-info')?.value || '';
      const style = document.getElementById('style-select')?.value || 'Freestyle';
      const rulesetName = document.getElementById('ruleset-select')?.value || 'Default Ruleset';
      const redInfo = document.getElementById('info-red')?.textContent || 'Rot';
      const blueInfo = document.getElementById('info-blue')?.textContent || 'Blau';
      
      const scores = calculateScores(appState.events);
      const statistics = calculateStatistics(appState.events);
      
      // Calculate winner
      let winner = 'none';
      if (appState.completed) {
        if (appState.winner && appState.winner !== 'none') {
          winner = appState.winner;
        } else if (scores.red > scores.blue) {
          winner = 'red';
        } else if (scores.blue > scores.red) {
          winner = 'blue';
        } else {
          winner = 'draw';
        }
      }
      
      // Calculate total bout time (sum of running periods)
      let totalBoutTime100ms = 0;
      let timerStartTime = 0;
      appState.events.forEach(e => {
        if (e.eventType === 'T_Started') {
          timerStartTime = e.boutTime100ms;
        } else if (e.eventType === 'T_Stopped' && timerStartTime !== null) {
          totalBoutTime100ms += (e.boutTime100ms - timerStartTime);
          timerStartTime = null;
        }
      });
      
      // Calculate real time duration
      let totalRealTime = 0;
      if (appState.createdAt && appState.completedAt) {
        totalRealTime = new Date(appState.completedAt) - new Date(appState.createdAt);
      }
      
      // Filter timeline (only bout events)
      const timeline = appState.events.filter(e => 
        e.boutTime100ms !== undefined && 
        !e.eventType.startsWith('T_') &&
        !e.eventType.startsWith('Event') &&
        !e.eventType.includes('_Modified') &&
        e.eventType !== 'ScoresheetReleased' &&
        e.eventType !== 'ScoresheetCompleted'
      ).map(e => ({
        seq: e.seq,
        eventType: e.eventType,
        boutTime100ms: e.boutTime100ms
      }));

      const exportData = {
        "$schema": "./export-v1.schema.json",
        "exportVersion": "1.0",
        "metadata": {
          "app": {
            "name": "CHAMP Protocol",
            "version": "1.0.0",
            "build": "2025-01-15T10:30:00Z"
          },
          "system": getSystemMetadata()
        },
        "bout": {
          "header": {
            "createdAt": appState.createdAt || new Date().toISOString(),
            "info": boutInfo,
            "style": style,
            "ruleset": {
              "reference": ruleset?.metadata?.name || rulesetName,
              "embedded": ruleset
            },
            "wrestlers": {
              "red": {
                "info": redInfo,
                "parsedInfo": parseInfo(redInfo)
              },
              "blue": {
                "info": blueInfo,
                "parsedInfo": parseInfo(blueInfo)
              }
            }
          },
          "summary": {
            "completed": appState.completed,
            "completedAt": appState.completedAt,
            "duration": {
              "totalBoutTime100ms": totalBoutTime100ms,
              "totalRealTime": totalRealTime,
              "periods": []
            },
            "scores": scores,
            "winner": winner,
            "victory": appState.victoryType ? {
              "type": appState.victoryType,
              "description": appState.victoryDescription || "",
              "classificationPoints": appState.classificationPoints || [0, 0]
            } : undefined,
            "statistics": statistics,
            "timeline": timeline,
            "notes": ""
          },
          "events": appState.events
        }
      };

      return exportData;
    }

    function downloadExport() {
      const exportData = generateExport();
      const jsonString = JSON.stringify(exportData, null, 2);
      const blob = new Blob([jsonString], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
      const filename = `champ-export-${timestamp}.json`;
      
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      console.log('Export downloaded:', filename);
    }

    // Expose export helper
    window.exportHelper = {
      generate: generateExport,
      download: downloadExport
    };

    window.testHelper = {
      injectEvent: (evt) => { appState.events.push(evt); updateTimeline(); },
      getState: () => ({
        mode: appState.mode,
        breakTimerRunning: appState.breakTimerRunning,
        breakTime100ms: appState.breakTime100ms,
        currentPeriodIndex: appState.currentPeriodIndex,
        periodTime100ms: appState.periodTime100ms,
        boutTime100ms: appState.boutTime100ms,
      }),
      setPeriodTime100ms: (value) => { appState.periodTime100ms = value; updateBoutTimeDisplay(); },
      setBoutTime100ms: (value) => { appState.boutTime100ms = value; },
      triggerPeriodBreak: (breakSeconds) => {
        recordEvent({ eventType: 'PeriodEnd', boutTime100ms: appState.boutTime100ms });
        const ruleset = loadEmbeddedRuleset();
        appState.currentPeriodIndex++;
        const seconds = breakSeconds !== undefined ? breakSeconds : ruleset.periodBreakTimeInSeconds;
        startPeriodBreak(seconds);
      }
    };

    // ===================================================================
    // INITIALIZATION
    // ===================================================================
    function initializeApp() {
      // Populate victory types once at startup
      populateVictoryTypes();

      // Clear timeline
      timeline.innerHTML = '';
      
      // Initialize scores
      updateScores();
      
      // Initialize event button click handlers
      initializeEventButtons();

      // Reset completion form explicitly (browser may restore values after reload)
      const complForm = document.getElementById('completion-form');
      complForm.classList.remove('winner-red', 'winner-blue');
      document.getElementById('compl-winner').value = '-';
      document.getElementById('compl-victory-type').value = '-';
      document.getElementById('compl-points-red').value = '0';
      document.getElementById('compl-points-blue').value = '0';
      
      // Apply initial state
      applyState('New');
      
      console.log('App initialized in New state');
    }

    // Initialize on page load
    initializeApp();
  </script>
</body>
